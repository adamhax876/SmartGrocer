<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrocer — استعادة كلمة المرور</title>
    <link rel="stylesheet" href="/css/global.css?v=1776968982396">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            padding: 2rem;
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            color: var(--primary);
        }
        .auth-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: right;
            margin-bottom: 1.5rem;
        }
        body.ltr .form-group { text-align: left; }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }
        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-input);
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            margin-top: 0.5rem;
        }
        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-link {
            color: var(--blue);
            font-weight: 700;
            transition: color 0.3s;
        }
        .auth-link:hover { color: var(--primary); }
        
        .alert {
            padding: 0.8rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }
        .alert-error {
            background: var(--red-light);
            color: var(--red);
            border: 1px solid var(--red);
        }
        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }
        
        .header-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .header-btn:hover { background: var(--bg-input); }
        .header-actions { display: flex; gap: 0.5rem; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="top-bar">
            <div>
                <a href="/index.html" class="header-btn" id="homeLink">
                    <i class="fas fa-arrow-right rtl-icon"></i>
                    <i class="fas fa-arrow-left ltr-icon" style="display:none;"></i>
                    <span data-i18n="back_home">الرئيسية</span>
                </a>
            </div>
            <div class="header-actions">
                <button onclick="toggleLanguage()" class="header-btn" id="langToggle">English</button>
                <button onclick="toggleTheme()" class="header-btn" id="theme-toggle">🌙</button>
            </div>
        </div>

        <div class="auth-card">
            <div class="logo-icon"><i class="fas fa-lock"></i></div>
            <h1 class="auth-title" data-i18n="title">استعادة كلمة المرور</h1>
            <p class="auth-subtitle" data-i18n="subtitle">أدخل بريدك الإلكتروني لإرسال رابط الاستعادة</p>

            <div class="alert alert-error" id="errorBox"></div>
            <div class="alert alert-success" id="successBox"></div>

            <form id="forgotForm" onsubmit="handleForgot(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="label_email">البريد الإلكتروني</label>
                    <input type="email" class="form-input" id="email" required placeholder="you@store.com">
                </div>
                <button type="submit" class="btn btn-primary btn-auth" id="submitBtn" data-i18n="btn_submit">إرسال رابط الاستعادة</button>
            </form>

            <div class="auth-footer">
                <span data-i18n="remembered">تذكرت كلمة المرور؟</span>
                <a href="/login.html" class="auth-link" data-i18n="back_login">العودة للدخول</a>
            </div>
        </div>
    </div>

    <!-- Script that imports the global language/theme handlers and performs API logic -->
    <script src="/js/app.js?v=1776968982396"></script>
    <script>
        const translations = {
            en: {
                title: "Reset Password",
                subtitle: "Enter your email to receive a recovery link",
                label_email: "Email Address",
                btn_submit: "Send Recovery Link",
                remembered: "Remembered your password?",
                back_login: "Back to Login",
                btn_loading: "Sending...",
                err_msg: "An error occurred, please try again.",
                back_home: "Homepage"
            },
            ar: {
                title: "استعادة كلمة المرور",
                subtitle: "أدخل بريدك الإلكتروني لإرسال رابط الاستعادة",
                label_email: "البريد الإلكتروني",
                btn_submit: "إرسال رابط الاستعادة",
                remembered: "تذكرت كلمة المرور؟",
                back_login: "العودة للدخول",
                btn_loading: "جاري الإرسال...",
                err_msg: "حدث خطأ، يرجى المحاولة مرة أخرى.",
                back_home: "الرئيسية"
            }
        };

        // Theme and Lang Initialization
        document.addEventListener('DOMContentLoaded', () => {
            const currentTheme = getTheme();
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeIcon(currentTheme);

            const currentLang = localStorage.getItem('sg_lang') || 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.body.className = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            updateTexts();
            updateIconsForLang();
        });

        function updateIconsForLang() {
            const dir = document.documentElement.dir;
            if (dir === 'rtl') {
                document.querySelector('.rtl-icon').style.display = 'inline-block';
                document.querySelector('.ltr-icon').style.display = 'none';
            } else {
                document.querySelector('.rtl-icon').style.display = 'none';
                document.querySelector('.ltr-icon').style.display = 'inline-block';
            }
        }

        function updateTexts() {
            const currentLang = localStorage.getItem('sg_lang') || 'ar';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                    if (el.tagName === 'INPUT') el.placeholder = translations[currentLang][key];
                }
            });
        }

        function toggleLanguage() {
            let currentLang = localStorage.getItem('sg_lang') || 'ar';
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('sg_lang', currentLang);
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.body.className = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            updateTexts();
            updateIconsForLang();
        }

        function showMsg(type, msg) {
            const errBox = document.getElementById('errorBox');
            const succBox = document.getElementById('successBox');
            errBox.style.display = 'none';
            succBox.style.display = 'none';
            if (type === 'error') {
                errBox.textContent = msg;
                errBox.style.display = 'block';
            } else {
                succBox.textContent = msg;
                succBox.style.display = 'block';
            }
        }

        async function handleForgot(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = document.getElementById('submitBtn');
            const currentLang = localStorage.getItem('sg_lang') || 'ar';
            const ogText = btn.textContent;
            btn.disabled = true;
            btn.textContent = translations[currentLang].btn_loading;
            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                btn.disabled = false;
                btn.textContent = ogText;
                if (!res.ok) throw new Error(data.message || translations[currentLang].err_msg);
                showMsg('success', data.message);
            } catch (err) {
                showMsg('error', err.message);
                btn.disabled = false;
                btn.textContent = ogText;
            }
        }
    </script>
</body>
</html>
