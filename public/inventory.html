<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrocer — جرد المخزون</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-inline-end: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            padding: 0 .5rem;
        }

        .sidebar-logo-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .sidebar-logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem .85rem;
            border-radius: 10px;
            font-size: .92rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all .2s;
            text-decoration: none;
        }

        .sidebar-link:hover {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .sidebar-link.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
        }

        .sidebar-link span:first-child {
            font-size: 1.15rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-bottom {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .main {
            flex: 1;
            margin-inline-start: 260px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: relative;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        .content {
            padding: 2rem;
            flex: 1;
            background: var(--bg);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .kpi-card {
            padding: 1.5rem;
            text-align: center;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .kpi-card h3 {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
        }

        .table-wrapper {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow-x: auto;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        [dir="ltr"] table {
            text-align: left;
        }

        th {
            padding: 1.2rem 1.5rem;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-weight: 500;
            font-size: 0.95rem;
        }

        tr:hover td {
            background: var(--bg-secondary);
        }
    </style>
</head>

<body class="light">
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/images/logo.png" style="width: 100%; max-height: 100px; object-fit: contain;" alt="Logo">

            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-link"><span class="icon">📊</span> <span
                        data-i18n="nav_dashboard">لوحة التحكم</span></a>
                <a href="/products.html" class="sidebar-link"><span class="icon">📦</span> <span
                        data-i18n="nav_products">المنتجات</span></a>
                <a href="/inventory.html" class="sidebar-link active"><span class="icon">📋</span> <span
                        data-i18n="nav_inventory">المخزون</span></a>
                <a href="/pos.html" class="sidebar-link"><span class="icon">💻</span> <span data-i18n="nav_pos">نقطة
                        البيع (POS)</span></a>
                <a href="/sales.html" class="sidebar-link"><span class="icon">💰</span> <span
                        data-i18n="nav_sales">المبيعات</span></a>
                <a href="/reports.html" class="sidebar-link"><span class="icon">📈</span> <span
                        data-i18n="nav_reports">التقارير</span></a>
                <a href="/support.html" class="sidebar-link"><span class="icon">🎧</span> <span
                        data-i18n="nav_support">الدعم الفني</span></a>
            </nav>
            <div class="sidebar-bottom">
                <button onclick="window.location.href='/'" class="btn btn-primary"
                    style="width: 100%; margin-bottom: 10px;" data-i18n="btn_home">🏠 الرئيسية</button>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;" data-i18n="btn_logout">تسجيل
                    الخروج</button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1 class="topbar-title" data-i18n="title_inv">إدارة وجرد المخزون</h1>
                <div class="topbar-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <button onclick="toggleTheme()" class="btn btn-outline" id="theme-toggle"
                        style="border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0;">🌓</button>
                    <button onclick="toggleLanguage()" class="btn btn-outline" id="langToggle"
                        style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">English</button>
                </div>
            </header>

            <div class="content">
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <h3 data-i18n="inv_kpi_total">إجمالي قيمة المخزون</h3>
                        <div id="inv-val" class="kpi-value" style="color: var(--primary);">0.00</div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="inv_kpi_items">عدد الأصناف المتوفرة</h3>
                        <div id="inv-count" class="kpi-value">0</div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="inv_kpi_alerts">تنبيهات نواقص (أقل من 10)</h3>
                        <div id="inv-alerts" class="kpi-value" style="color: var(--error);">0</div>
                    </div>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th data-i18n="th_name">اسم المنتج</th>
                                <th data-i18n="th_cat">الفئة</th>
                                <th data-i18n="th_qty">الكمية الحالية</th>
                                <th data-i18n="th_val">قيمة المخزون</th>
                                <th data-i18n="th_action">تعديل الجرد</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTableBody">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 2rem;">جاري التحميل...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/app.js"></script>
    <script>
        const translations = {
            en: {
                nav_dashboard: "Dashboard", nav_products: "Products", nav_inventory: "Inventory", nav_pos: "POS System", nav_sales: "Sales", nav_reports: "Reports", nav_support: "Support",
                btn_theme: "Theme", btn_logout: "Logout",
                title_inv: "Inventory & Stock Count",
                inv_kpi_total: "Total Stock Value", inv_kpi_items: "Available SKU Count", inv_kpi_alerts: "Low Stock Alerts (<10)",
                th_name: "Item Name", th_cat: "Category", th_qty: "Current Stock", th_val: "Stock Value", th_action: "Adjust Stock"
            },
            ar: {
                nav_dashboard: "لوحة التحكم", nav_products: "المنتجات", nav_inventory: "المخزون", nav_pos: "نقطة البيع (POS)", nav_sales: "المبيعات", nav_reports: "التقارير", nav_support: "الدعم الفني",
                btn_theme: "المظهر", btn_logout: "تسجيل الخروج",
                title_inv: "إدارة وجرد المخزون",
                inv_kpi_total: "إجمالي قيمة المخزون", inv_kpi_items: "عدد الأصناف المتوفرة", inv_kpi_alerts: "تنبيهات نواقص (أقل من 10)",
                th_name: "اسم المنتج", th_cat: "الفئة", th_qty: "الكمية الحالية", th_val: "قيمة المخزون", th_action: "تعديل الجرد"
            }
        };

        let currentLang = localStorage.getItem('sg_lang') || 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
        document.body.className = localStorage.getItem('sg_theme') || 'light';

        function updateTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
        }
        updateTexts();

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('sg_lang', currentLang);
            updateTexts(); loadInventory(); // Re-render table and text
        }

        async function loadInventory() {
            try {
                const res = await api('/api/products');
                const tbody = document.getElementById('inventoryTableBody');

                let totalVal = 0;
                let alerts = 0;

                tbody.innerHTML = res.products.map(p => {
                    const stockVal = p.quantity * (p.costPrice || 0);
                    totalVal += stockVal;
                    if (p.quantity < 10) alerts++;

                    return `
                        <tr>
                            <td><strong>${p.name}</strong></td>
                            <td style="color: var(--text-secondary);">${p.category}</td>
                            <td>
                                <div style="display:flex; align-items:center; gap:0.5rem;">
                                    <span style="font-weight:bold; color: ${p.quantity < 10 ? 'var(--error)' : 'var(--text)'}; width: 30px;">${p.quantity}</span>
                                </div>
                            </td>
                            <td style="color: var(--primary); font-weight: bold;">${stockVal.toFixed(2)}</td>
                            <td>
                                <button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="updateStock('${p._id}', ${p.quantity}, 1)">+1</button>
                                <button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="updateStock('${p._id}', ${p.quantity}, -1)">-1</button>
                            </td>
                        </tr>
                    `;
                }).join('');

                if (res.products.length === 0) tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No items found.</td></tr>`;

                document.getElementById('inv-val').innerHTML = formatMoney(totalVal);
                document.getElementById('inv-count').textContent = res.products.length;
                document.getElementById('inv-alerts').textContent = alerts;

            } catch (e) { console.error(e); }
        }

        window.updateStock = async function (id, currentQty, amount) {
            const newQty = currentQty + amount;
            if (newQty < 0) return;
            try {
                // Assuming standard REST PUT `/api/products/:id` with payload
                await api(`/api/products/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ quantity: newQty })
                });
                loadInventory();
            } catch (e) { alert('خطأ في تعديل المخزون'); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!getToken()) window.location.href = '/login.html';
            else loadInventory();
        });
    </script>
</body>

</html>
