<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - لوحة الإدارة | Smart Grocer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800"><i class="fas fa-shield-alt text-blue-600 mr-2"></i> الإدارة
                العليا</h1>
            <p class="text-gray-500 mt-2">تسجيل الدخول للوحة تحكم النظام (SaaS)</p>
        </div>

        <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm text-center"></div>

        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="email">البريد الإلكتروني</label>
                <input class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    type="email" id="email" required placeholder="admin@smartgrocer.com">
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-semibold mb-2" for="password">كلمة المرور</label>
                <input class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-300">
                تسجيل الدخول
            </button>
        </form>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');

            try {
                // We're reusing the existing login endpoint for simplicity right now
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Check if role is really admin
                    if (data.user && data.user.role === 'admin') {
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminData', JSON.stringify(data.user));
                        window.location.href = '/admin/dashboard.html';
                    } else {
                        errorDiv.textContent = 'هذا الحساب ليس لديه صلاحيات الإدارة';
                        errorDiv.classList.remove('hidden');
                    }
                } else {
                    errorDiv.textContent = data.message || 'بيانات الدخول غير صحيحة';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = 'حدث خطأ في الاتصال بالخادم';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
