<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات النظام | Smart Grocer Admin</title>
    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.replace('/admin/login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="sidebar w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold"><i class="fas fa-bolt text-yellow-400 mr-2"></i> SmartGrocer SaaS</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-3">
                <li>
                    <a href="/admin/dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="dashboard">
                        <i class="fas fa-tachometer-alt"></i> <span data-translate="nav_dashboard">الرئيسية</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/stores.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="stores">
                        <i class="fas fa-users"></i> <span data-translate="nav_stores">المتاجر المشتركة</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/payments.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="payments">
                        <i class="fas fa-money-check-alt"></i><span data-translate="nav_payments">طرق الدفع</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="settings">
                        <i class="fas fa-cogs"></i> <span data-translate="nav_settings">إعدادات النظام</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/tickets.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="tickets">
                        <i class="fas fa-life-ring"></i> <span data-translate="nav_tickets">تذاكر الدعم</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-600/10 text-red-500 rounded-lg hover:bg-red-600 hover:text-white transition">
                <i class="fas fa-sign-out-alt"></i>
                <span data-translate="nav_logout">تسجيل خروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-xl font-semibold text-gray-800" data-translate="title_settings">إعدادات النظام العامة</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleAdminLang()" id="adminLangBtn" class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition border">English</button>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-6">
            <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-4">الإعدادات الأساسية</h3>

                <form id="settingsForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="lbl_siteName">اسم المنصة (Site Name)</label>
                        <input type="text" id="site_name"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500"
                            placeholder="Smart Grocer">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="lbl_supportEmail">البريد الإلكتروني للدعم (Support Email)</label>
                        <input type="email" id="support_email"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500"
                            placeholder="support@smartgrocer.com">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" data-translate="lbl_currency">العملة الافتراضية للنظام (Currency)</label>
                        <select id="currency"
                            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                            <option value="$">دولار أمريكي ($)</option>
                            <option value="EGP">جنيه مصري (EGP)</option>
                            <option value="SAR">ريال سعودي (SAR)</option>
                            <option value="AED">درهم إماراتي (AED)</option>
                            <option value="€">يورو (€)</option>
                            <option value="£">جنيه إسترليني (£)</option>
                            <option value="KWD">دينار كويتي (KWD)</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-3 p-4 bg-gray-50 border rounded-lg">
                        <input type="checkbox" id="maintenance_mode"
                            class="w-5 h-5 text-blue-600 rounded focus:ring-blue-500">
                        <div>
                            <label for="maintenance_mode" class="font-bold text-gray-800 cursor-pointer" data-translate="lbl_maintenance">وضع الصيانة (Maintenance Mode)</label>
                            <p class="text-xs text-gray-500" data-translate="lbl_maintenance_hint">سوف يمنع المتاجر من تسجيل الدخول لحين إيقافه.</p>
                        </div>
                    </div>

                    <div class="pt-4 border-t flex justify-end">
                        <button type="submit" id="saveBtn"
                            class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold flex items-center gap-2 transition">
                            <i class="fas fa-save"></i> <span data-translate="saveBtn">حفظ الإعدادات</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="/js/admin-lang.js?v=1777062214746"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin/login.html';

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login.html';
        }

        async function fetchSettings() {
            try {
                const res = await fetch('/api/admin/settings', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success && data.data) {
                    const settings = data.data;
                    settings.forEach(s => {
                        const el = document.getElementById(s.key);
                        if (el) {
                            if (el.type === 'checkbox') el.checked = s.value === 'true' || s.value === true;
                            else el.value = s.value;
                        }
                    });
                }
            } catch (error) {
                console.error('Error fetching settings:', error);
            }
        }

        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

            const settings = [
                { key: 'site_name', value: document.getElementById('site_name').value },
                { key: 'support_email', value: document.getElementById('support_email').value },
                { key: 'currency', value: document.getElementById('currency').value },
                { key: 'maintenance_mode', value: document.getElementById('maintenance_mode').checked }
            ];

            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ settings })
                });
                const data = await res.json();

                if (data.success) {
                    Swal.fire({ title: 'تم', text: data.message, icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                } else {
                    Swal.fire('خطأ', data.message, 'error');
                }
            } catch (e) {
                Swal.fire('خطأ', 'حدث خطأ غير متوقع', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ الإعدادات';
            }
        });

        // Initialize
        fetchSettings();
    </script>
</body>

</html>
