<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المتاجر | Smart Grocer Admin</title>
    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.replace('/admin/login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;

</head>

<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-64 bg-gray-900 text-white flex flex-col hidden md:flex">

            <ul class="space-y-2 px-3">

                        <i class="fas fa-tachometer-alt"></i> <span data-translate="nav_dashboard">الرئيسية</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/stores.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="stores">
                        <i class="fas fa-users"></i> <span data-translate="nav_stores">المتاجر المشتركة</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/payments.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="payments">
                        <i class="fas fa-money-check-alt"></i><span data-translate="nav_payments">طرق الدفع</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="settings">
                        <i class="fas fa-cogs"></i> <span data-translate="nav_settings">إعدادات النظام</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/tickets.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="tickets">
                        <i class="fas fa-life-ring"></i> <span data-translate="nav_tickets">تذاكر الدعم</span>

        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-600/10 text-red-500 rounded-lg hover:bg-red-600 hover:text-white transition">

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-xl font-semibold text-gray-800" data-translate="users">المتاجر المشتركة</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleAdminLang()" id="adminLangBtn"
                    class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition border">English</button>
                <button onclick="inviteSupportModal()"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                    <i class="fas fa-headset"></i> <span data-translate="btn_inviteSupport">دعوة فريق دعم</span>
                </button>
                <button onclick="openMessageModal('all')"
                    class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                    <i class="fas fa-paper-plane"></i> <span data-translate="btn_sendAll">إرسال إشعار للجميع</span>
                </button>
                <div class="relative w-full md:w-96">
                    <input type="text" id="searchInput" placeholder="ابحث باسم المتجر..."
                        class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:border-blue-500">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-6">

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <!-- Search & Filter -->
                <div class="flex flex-col md:flex-row gap-4 justify-between items-center mb-6">
                    <div>
                        <button onclick="openMessageModal('all')"
                            class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 font-semibold shadow-sm flex items-center gap-2">
                            <i class="fas fa-paper-plane"></i> <span data-translate="btn_sendAll">إرسال إشعار للجميع</span>
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <div class="overflow-x-auto">
                    <table class="w-full text-right text-sm text-gray-700">
                        <thead class="text-xs text-gray-600 uppercase bg-gray-50 border-b">
                            <tr>
                                <th class="px-4 py-3" data-translate="th_store">المتجر / المالك</th>
                                <th class="px-4 py-3" data-translate="th_email">البريد الإلكتروني</th>
                                <th class="px-4 py-3" data-translate="th_type">النوع</th>
                                <th class="px-4 py-3" data-translate="th_join">تاريخ الانضمام</th>
                                <th class="px-4 py-3" data-translate="th_plan">الباقة وانتهاء الصلاحية</th>
                                <th class="px-4 py-3" data-translate="th_ip">IP الدخول</th>
                                <th class="px-4 py-3" data-translate="th_status">الحالة</th>
                                <th class="px-4 py-3 text-center" data-translate="th_action">إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <!-- Populated dynamically via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>

        <!-- Edit Modal Overlay -->
        <div id="editModal" class="fixed inset-0 bg-black/50 hidden flex-col items-center justify-center z-50">
            <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-6 relative">
                <button onclick="closeEditModal()" class="absolute top-4 left-4 text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
                <div class="mb-4 border-b pb-3">
                    <h3 class="text-xl font-bold text-gray-900">إدارة تفاصيل المتجر</h3>
                    <p class="text-sm text-gray-500" id="modalStoreName"></p>
                </div>

                <div id="modalContent" class="space-y-4">
                    <!-- Loaded dynamically -->
                    <div class="text-center py-8"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>
                </div>

                <div class="mt-6 flex gap-3 justify-end pt-4 border-t hidden" id="modalFooter">
                    <button onclick="closeEditModal()"
                        class="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">إلغاء</button>
                    <button onclick="saveStoreChanges()" id="saveBtn"
                        class="px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 flex items-center gap-2">
                        حفظ التعديلات
                    </button>
                </div>
            </div>
        </div>

        <!-- Message Modal Overlay -->
        <div id="msgModal" class="fixed inset-0 bg-black/50 hidden flex-col items-center justify-center z-50">
            <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl p-6 relative">
                <button onclick="closeMessageModal()" class="absolute top-4 left-4 text-gray-500 hover:text-gray-800">
                    <i class="fas fa-times text-xl"></i>
                </button>
                <div class="mb-4 border-b pb-3">
                    <h3 class="text-xl font-bold text-gray-900">إرسال إشعار</h3>
                    <p class="text-sm text-gray-500" id="msgTargetName">إلى جميع المتاجر</p>
                </div>
                <div class="space-y-4">
                    <input type="hidden" id="msgReceiverId">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">عنوان الرسالة</label>
                        <input type="text" id="msgTitle"
                            class="w-full border-gray-300 rounded-lg shadow-sm focus:border-purple-500 focus:ring-purple-500 p-2 border">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">محتوى الرسالة</label>
                        <textarea id="msgContent" rows="4"
                            class="w-full border-gray-300 rounded-lg shadow-sm focus:border-purple-500 focus:ring-purple-500 p-2 border"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">رابط صورة (اختياري)</label>
                        <input type="url" id="msgImage" placeholder="https://..."
                            class="w-full border-gray-300 rounded-lg shadow-sm focus:border-purple-500 focus:ring-purple-500 p-2 border">
                    </div>
                </div>
                <div class="mt-6 flex gap-3 justify-end pt-4 border-t">
                    <button onclick="closeMessageModal()"
                        class="px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">إلغاء</button>
                    <button onclick="sendMessage()" id="sendMsgBtn"
                        class="px-4 py-2 text-white bg-purple-600 rounded-lg hover:bg-purple-700 flex items-center gap-2">
                        <i class="fas fa-paper-plane"></i> إرسال
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script src="/js/admin-lang.js?v=1777077545473"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin/login.html';

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login.html';
        }

        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success) {
                    renderTable(data.data);
                } else {
                    Swal.fire('خطأ', data.message, 'error');
                }
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        function renderTable(users) {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = users.map(user => `
                <tr class="border-b hover:bg-gray-50 transition">
                    <td class="px-4 py-4">
                        <p class="font-bold text-gray-900">${user.storeName}</p>
                        <p class="text-xs text-gray-500">${user.fullName} | ${user.country || 'N/A'}</p>
                    </td>
                    <td class="px-4 py-4">${user.email}</td>
                    <td class="px-4 py-4">
                        <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">
                            ${user.storeType}
                        </span>
                    </td>
                    <td class="px-4 py-4 text-sm">${new Date(user.createdAt).toLocaleDateString('ar-EG')}</td>
                    <td class="px-4 py-4">
                        <p class="font-semibold text-purple-700 text-sm">${user.subscriptionPlan || 'Free Trial'}</p>
                        <p class="text-xs font-bold text-gray-500 mt-1">
                            ينتهي: ${user.subscriptionEndDate ? new Date(user.subscriptionEndDate).toLocaleDateString('ar-EG') : 'غير محدد'}
                        </p>
                    </td>
                    <td class="px-4 py-4 font-mono text-xs text-blue-600 font-bold" dir="ltr">${user.lastIpAddress || '-'}</td>
                    <td class="px-4 py-4">
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${user.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${user.status === 'active' ? adminDict[adminLang].statusActive : adminDict[adminLang].statusSuspended}
                        </span>
                    </td>
                    <td class="px-4 py-4 flex justify-center gap-2">
                        <button onclick="assignSubscriptionModal('${user._id}', '${user.storeName}')" class="px-3 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200 text-xs" title="تفعيل / تجديد الباقة">
                            <i class="fas fa-crown"></i>
                        </button>
                        ${user.status === 'active'
                    ? `<button onclick="toggleUserStatus('${user._id}', 'suspend')" class="px-3 py-1 bg-yellow-100 text-yellow-700 rounded hover:bg-yellow-200 text-xs" title="إيقاف"><i class="fas fa-ban"></i></button>`
                    : `<button onclick="toggleUserStatus('${user._id}', 'activate')" class="px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-xs" title="تفعيل"><i class="fas fa-check"></i></button>`
                }
                        <button onclick="openEditModal('${user._id}')" class="px-3 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 text-xs" title="تعديل">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="openMessageModal('${user._id}', '${user.storeName}')" class="px-3 py-1 bg-purple-100 text-purple-700 rounded hover:bg-purple-200 text-xs" title="رسالة">
                            <i class="fas fa-envelope"></i>
                        </button>
                        <button onclick="deleteUser('${user._id}')" class="px-3 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200 text-xs" title="حذف">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function assignSubscriptionModal(userId, storeName) {
            // Default +1 month
            const defaultDate = new Date();
            defaultDate.setMonth(defaultDate.getMonth() + 1);
            const defaultDateStr = defaultDate.toISOString().split('T')[0];

            const { value: formValues } = await Swal.fire({
                title: 'تحديد باقة الاشتراك',
                html: `
                    <p class="mb-4 text-sm text-gray-600">اختر الباقة وتاريخ الانتهاء الدقيق لمتجر ${storeName}</p>
                    <select id="swal-plan" class="w-full border p-2 rounded mb-3 text-right" style="direction: rtl;" onchange="
                        if(this.value === 'Free Trial') {
                            document.getElementById('swal-endDate').disabled = true;
                            document.getElementById('swal-endDate').style.opacity = '0.5';
                            document.getElementById('trial-hint').style.display = 'block';
                        } else {
                            document.getElementById('swal-endDate').disabled = false;
                            document.getElementById('swal-endDate').style.opacity = '1';
                            document.getElementById('trial-hint').style.display = 'none';
                        }
                    ">
                        <option value="Basic Plan">الباقة الأساسية (Basic)</option>
                        <option value="Pro Plan">الباقة الاحترافية (Pro)</option>
                        <option value="Free Trial">نسخة تجريبية (Free)</option>
                    </select>
                    <label class="block text-sm text-gray-500 mb-1 text-right">ينتهي الاشتراك في يوم:</label>
                    <input type="date" id="swal-endDate" class="w-full border p-2 rounded text-right" value="${defaultDateStr}" style="direction: rtl;">
                    <p id="trial-hint" class="text-xs text-red-500 text-right mt-1" style="display: none;">النسخة التجريبية 14 يوماً إجبارياً من تاريخ اليوم ولن يُعتد بالتاريخ أعلاه.</p>
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'حفظ وتفعيل',
                cancelButtonText: 'إلغاء',
                preConfirm: () => {
                    const plan = document.getElementById('swal-plan').value;
                    const endDate = document.getElementById('swal-endDate').value;
                    if (!plan || !endDate) {
                        Swal.showValidationMessage('يرجى تحديد الباقة وتاريخ الانتهاء السليم');
                    }
                    return { plan, endDate };
                }
            });

            if (formValues) {
                try {
                    const res = await fetch(`/api/admin/users/${userId}/assign-subscription`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            planName: formValues.plan,
                            endDate: formValues.endDate
                        })
                    });
                    const data = await res.json();
                    if (data.success) {
                        Swal.fire('تم التفعيل!', data.message, 'success');
                        fetchUsers(); // Refresh table
                    } else {
                        Swal.fire('خطأ', data.message, 'error');
                    }
                } catch (err) {
                    Swal.fire('خطأ', 'حدث خطأ في الاتصال بالسيرفر.', 'error');
                }
            }
        }

        const adminData = JSON.parse(localStorage.getItem('adminData') || '{}');
        if (adminData.role === 'support') {
            document.querySelector('nav').style.display = 'none'; // Lock them inside whatever page they land on visually
        }

        async function inviteSupportModal() {
            const { value: email } = await Swal.fire({
                title: 'دعوة عضو لدعم فني',
                input: 'email',
                inputLabel: 'البريد الإلكتروني',
                inputPlaceholder: 'support@example.com',
                showCancelButton: true,
                confirmButtonText: 'إرسال دعوة',
                cancelButtonText: 'إلغاء',
                inputValidator: (value) => {
                    if (!value) return 'يجب إدخال بريد إلكتروني!'
                }
            });

            if (email) {
                try {
                    Swal.fire({ title: 'جاري الإرسال...', didOpen: () => { Swal.showLoading() } });
                    const res = await fetch('/api/admin/invite-support', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ email })
                    });
                    const data = await res.json();

                    if (data.success) {
                        Swal.fire({ title: 'تمت الدعوة', text: data.message, icon: 'success' });
                    } else {
                        Swal.fire('خطأ', data.message, 'error');
                    }
                } catch (err) {
                    Swal.fire('خطأ', 'حدث خطأ في الاتصال', 'error');
                }
            }
        }

        async function toggleUserStatus(id, action) {
            try {
                const res = await fetch(`/api/admin/users/${id}/${action}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.success) {
                    Swal.fire({
                        title: 'تم بنجاح',
                        text: data.message,
                        icon: 'success',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 3000
                    });
                    fetchUsers(); // Refresh
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function deleteUser(id) {
            const confirmed = await Swal.fire({
                title: 'هل أنت متأكد؟',
                text: "لن تتمكن من استعادة هذا المتجر!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'نعم، احذف',
                cancelButtonText: 'إلغاء'
            });

            if (confirmed.isConfirmed) {
                try {
                    const res = await fetch(`/api/admin/users/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();

                    if (data.success) {
                        Swal.fire('تم الحذف!', data.message, 'success');
                        fetchUsers();
                    }
                } catch (err) {
                    console.error(err);
                }
            }
        }

        let currentEditingUserId = null;

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
            currentEditingUserId = null;
        }

        async function openEditModal(userId) {
            currentEditingUserId = userId;
            const modal = document.getElementById('editModal');
            const content = document.getElementById('modalContent');
            const footer = document.getElementById('modalFooter');
            const storeNameHeader = document.getElementById('modalStoreName');

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            content.innerHTML = '<div class="text-center py-8"><i class="fas fa-spinner fa-spin text-3xl text-blue-500"></i></div>';
            footer.classList.add('hidden');
            storeNameHeader.textContent = 'جار التحميل...';

            try {
                const res = await fetch(`/api/admin/users/${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (!data.success) {
                    content.innerHTML = `< div class= "text-red-500 text-center" > ${data.message}</div > `;
                    return;
                }

                const { user } = data.data;
                storeNameHeader.textContent = user.storeName + ' (' + user.email + ')';

                content.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-3 rounded-lg border">
                            <span class="block text-xs text-gray-500 mb-1">الاسم الكامل</span>
                            <span class="font-semibold">${user.fullName}</span>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg border">
                            <span class="block text-xs text-gray-500 mb-1">تاريخ التسجيل</span>
                            <span class="font-semibold">${new Date(user.createdAt).toLocaleDateString('ar-EG')}</span>
                        </div>
                    </div>
                    <div class="mt-4 border-t pt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">اسم المتجر</label>
                        <input type="text" id="editStoreName" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border outline-none focus:border-blue-500" value="${user.storeName}">
                    </div>
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">كلمة مرور جديدة (اختياري)</label>
                        <input type="text" id="editPassword" class="w-full border-gray-300 rounded-lg shadow-sm p-2 border outline-none focus:border-blue-500" placeholder="اتركه فارغاً إذا لم ترد التغيير للمتجر">
                        <p class="text-xs text-gray-500 mt-1"><i class="fas fa-info-circle"></i> يمكنك تعيين كلمة سر جديدة هنا ونسخها وإرسالها للمستخدم.</p>
                    </div>
                `;

                footer.classList.remove('hidden');
            } catch (e) {
                content.innerHTML = `< div class="text-red-500 text-center" > حدث خطأ في جلب البيانات</div > `;
            }
        }

        async function saveStoreChanges() {
            const storeName = document.getElementById('editStoreName').value;
            const password = document.getElementById('editPassword').value;

            if (!storeName) {
                Swal.fire('خطأ', 'اسم المتجر مطلوب', 'error');
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

            try {
                const res = await fetch(`/api/admin/users/${currentEditingUserId}/profile`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ storeName, password })
                });
                const data = await res.json();

                if (data.success) {
                    Swal.fire({ title: 'تم', text: data.message, icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                    closeEditModal();
                    fetchUsers();
                } else {
                    Swal.fire('خطأ', data.message, 'error');
                }
            } catch (e) {
                console.error(e);
                Swal.fire('خطأ', 'حدث خطأ غير متوقع', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'حفظ التعديلات';
            }
        }

        // Messaging functions
        function closeMessageModal() {
            document.getElementById('msgModal').classList.add('hidden');
            document.getElementById('msgModal').classList.remove('flex');
            document.getElementById('msgTitle').value = '';
            document.getElementById('msgContent').value = '';
            document.getElementById('msgImage').value = '';
        }

        function openMessageModal(targetId, targetName) {
            document.getElementById('msgModal').classList.remove('hidden');
            document.getElementById('msgModal').classList.add('flex');

            if (targetId === 'all') {
                document.getElementById('msgTargetName').textContent = 'إرسال إلى جميع المتاجر';
                document.getElementById('msgReceiverId').value = '';
            } else {
                document.getElementById('msgTargetName').textContent = 'إرسال إلى: ' + targetName;
                document.getElementById('msgReceiverId').value = targetId;
            }
        }

        async function sendMessage() {
            const title = document.getElementById('msgTitle').value;
            const content = document.getElementById('msgContent').value;
            const receiverId = document.getElementById('msgReceiverId').value;
            const image = document.getElementById('msgImage').value;

            if (!title || !content) {
                Swal.fire('تنبيه', 'يرجى إدخال عنوان ومحتوى الرسالة', 'warning');
                return;
            }

            const btn = document.getElementById('sendMsgBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

            try {
                const res = await fetch('/api/admin/messages', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ receiverId, title, content, image })
                });
                const data = await res.json();

                if (data.success) {
                    Swal.fire({ title: 'تم', text: 'تم إرسال الرسالة بنجاح', icon: 'success', toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                    closeMessageModal();
                } else {
                    Swal.fire('خطأ', data.message, 'error');
                }
            } catch (e) {
                Swal.fire('خطأ', 'حدث خطأ، حاول مرة أخرى', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال';
            }
        }

        // Initialize
        fetchUsers();
    </script>
</body>

</html>
