<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Smart Grocer Admin</title>
    <script>
        if (!localStorage.getItem('adminToken')) {
            window.location.replace('/admin/login.html');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .sidebar { transition: all 0.3s ease; }
        .stat-card { transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .store-row { transition: background 0.15s; }
        .store-row:hover { background: #f8fafc; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="sidebar w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold"><i class="fas fa-bolt text-yellow-400 mr-2"></i> SmartGrocer SaaS</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-3">
                <li>
                    <a href="/admin/dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="dashboard">
                        <i class="fas fa-tachometer-alt"></i> <span data-translate="nav_dashboard">الرئيسية</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/stores.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="stores">
                        <i class="fas fa-users"></i> <span data-translate="nav_stores">المتاجر المشتركة</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/payments.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="payments">
                        <i class="fas fa-money-check-alt"></i><span data-translate="nav_payments">طرق الدفع</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/settings.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="settings">
                        <i class="fas fa-cogs"></i> <span data-translate="nav_settings">إعدادات النظام</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/tickets.html" class="flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-800 transition text-gray-300 hover:text-white" data-page="tickets">
                        <i class="fas fa-life-ring"></i> <span data-translate="nav_tickets">تذاكر الدعم</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-600/10 text-red-500 rounded-lg hover:bg-red-600 hover:text-white transition">
                <i class="fas fa-sign-out-alt"></i>
                <span data-translate="nav_logout">تسجيل خروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <button id="mobileMenuBtn" class="md:hidden text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-xl font-semibold text-gray-800" data-translate="overview">نظرة عامة</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleAdminLang()" id="adminLangBtn"
                    class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition border">English</button>
                <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
                    A
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-6">

            <!-- Stats Cards — 3 cards with icons -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="stat-card bg-white rounded-2xl shadow-sm p-6 border border-gray-100 flex items-center gap-4" style="border-right: 4px solid #4F46E5;">
                    <div class="h-14 w-14 rounded-2xl bg-indigo-50 flex items-center justify-center text-indigo-600 text-2xl">
                        <i class="fas fa-store"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-0.5" data-translate="statStores">المتاجر النشطة</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-stores">—</h3>
                    </div>
                </div>

                <div class="stat-card bg-white rounded-2xl shadow-sm p-6 border border-gray-100 flex items-center gap-4" style="border-right: 4px solid #10b981;">
                    <div class="h-14 w-14 rounded-2xl bg-green-50 flex items-center justify-center text-green-600 text-2xl">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-0.5" data-translate="statSubs">الاشتراكات الفعالة</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-subs">—</h3>
                    </div>
                </div>

                <div class="stat-card bg-white rounded-2xl shadow-sm p-6 border border-gray-100 flex items-center gap-4" style="border-right: 4px solid #f59e0b;">
                    <div class="h-14 w-14 rounded-2xl bg-yellow-50 flex items-center justify-center text-yellow-600 text-2xl">
                        <i class="fas fa-headset"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500 mb-0.5" data-translate="statTickets">تذاكر الدعم المفتوحة</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-tickets">—</h3>
                    </div>
                </div>
            </div>

            <!-- Charts + Table -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Plan Distribution Chart -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                    <div class="flex items-center justify-between mb-4">
                        <h4 class="font-semibold text-gray-800" data-translate="chartTitle">توزيع باقات المشتركين</h4>
                        <span class="text-xs px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 font-semibold" data-translate="chartBadge">📊 حسب الباقات النشطة</span>
                    </div>
                    <div class="relative flex-1 w-full" style="min-height: 280px;">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>

                <!-- Latest Stores -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-semibold text-gray-800" data-translate="latest">أحدث المتاجر</h4>
                        <a href="/admin/stores.html" class="text-sm text-blue-600 hover:underline font-semibold"
                            data-translate="viewAll">عرض الكل →</a>
                    </div>
                    <div id="latestStoresContainer">
                        <div class="text-center py-8 text-gray-400">
                            <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                            <p class="text-sm">جاري التحميل...</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="/js/admin-lang.js?v=1777063294972"></script>
    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login.html';
        }

        const adminData = JSON.parse(localStorage.getItem('adminData') || '{}');
        if (adminData.role === 'support') {
            const navElements = document.querySelectorAll('nav');
            if (navElements.length > 0) navElements[0].style.display = 'none';
        }

        // Localization is now handled by /js/admin-lang.js?v=1777063294972



        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminData');
            window.location.href = '/admin/login.html';
        }

        async function fetchDashboardStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (res.status === 401 || res.status === 403) { logout(); return; }

                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-stores').textContent = data.data.totalUsers || 0;
                    document.getElementById('stat-subs').textContent = data.data.activeSubscriptions || 0;
                    document.getElementById('stat-tickets').textContent = data.data.openTickets || 0;
                    renderPlanDistribution(data.data.planDistribution);
                }

                // Fetch latest stores
                const usersRes = await fetch('/api/admin/users', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const usersData = await usersRes.json();
                renderLatestStores(usersData.success ? usersData.data : []);

                // Fetch open tickets count
                try {
                    const ticketsRes = await fetch('/api/admin/tickets', { headers: { 'Authorization': 'Bearer ' + token } });
                    const ticketsData = await ticketsRes.json();
                    if (ticketsData.success) {
                        const openCount = ticketsData.data.filter(t => t.status === 'open' || t.status === 'pending').length;
                        document.getElementById('stat-tickets').textContent = openCount;
                    } else {
                        document.getElementById('stat-tickets').textContent = '0';
                    }
                } catch(e) { document.getElementById('stat-tickets').textContent = '0'; }

            } catch (err) {
                console.error("Error fetching stats:", err);
                document.getElementById('latestStoresContainer').innerHTML = '<p class="text-center text-red-400 py-4">⚠️ خطأ في تحميل البيانات</p>';
            }
        }

        function renderLatestStores(users) {
            const container = document.getElementById('latestStoresContainer');
            
            if (!users || users.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <i class="fas fa-store-slash text-3xl mb-3"></i>
                        <p class="text-sm">${adminDict[adminLang].noStores}</p>
                    </div>`;
                return;
            }

            // Sort by newest first and take top 5
            const latest = users.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0, 5);
            
            container.innerHTML = '<div class="space-y-3">' + latest.map((user, i) => `
                <div class="store-row flex items-center justify-between p-3 rounded-xl border border-gray-100 animate-in" style="animation-delay: ${i * 80}ms">
                    <div class="flex items-center gap-3">
                        <div class="h-10 w-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-bold text-sm">
                            ${(user.storeName && user.storeName !== 'undefined' ? user.storeName[0].toUpperCase() : (user.name && user.name !== 'undefined' ? user.name[0].toUpperCase() : '?'))}
                        </div>
                        <div>
                            <p class="font-semibold text-gray-800 text-sm">${user.storeName && user.storeName !== 'undefined' ? user.storeName : (user.name && user.name !== 'undefined' ? user.name : 'N/A')}</p>
                            <p class="text-xs text-gray-400">${user.email || ''}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${
                            user.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                        }">${user.status === 'active' ? adminDict[adminLang].statusActive : adminDict[adminLang].statusSuspended}</span>
                    </div>
                </div>
            `).join('') + '</div>';
        }

        // Initialize dashboard
        fetchDashboardStats();

        // Plan Distribution Chart
        let growthChartInstance = null;

        function renderPlanDistribution(planData) {
            const ctx = document.getElementById('growthChart').getContext('2d');
            
            let labels = [];
            let chartData = [];
            let bgColors = [];

            const colorMap = {
                'Free Trial': '#6366f1', // Indigo
                'Basic Plan': '#10b981', // Green
                'Pro Plan': '#f59e0b',   // Yellow
                'default': '#94a3b8'
            };

            const translateMapAr = {
                'Free Trial': 'فترة تجريبية',
                'Basic Plan': 'الباقة الأساسية',
                'Pro Plan': 'الباقة الاحترافية'
            };
            const translateMapEn = {
                'Free Trial': 'Free Trial',
                'Basic Plan': 'Basic Plan',
                'Pro Plan': 'Pro Plan'
            };

            if (planData && planData.length > 0) {
                planData.forEach(item => {
                    const planName = item._id || 'Unknown';
                    const localizedName = adminLang === 'ar' ? (translateMapAr[planName] || planName) : (translateMapEn[planName] || planName);
                    labels.push(localizedName);
                    chartData.push(item.count);
                    bgColors.push(colorMap[planName] || colorMap['default']);
                });
            } else {
                labels = [adminLang === 'ar' ? 'لا يوجد اشتراكات' : 'No Subscriptions'];
                chartData = [1];
                bgColors = ['#e2e8f0'];
            }

            if (growthChartInstance) growthChartInstance.destroy();

            growthChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: chartData,
                        backgroundColor: bgColors,
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: { family: 'Cairo', size: 13, weight: '600' },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: '#fff',
                            titleColor: '#1e293b',
                            bodyColor: '#64748b',
                            borderColor: '#e2e8f0',
                            borderWidth: 1,
                            cornerRadius: 10,
                            padding: 12,
                        }
                    }
                }
            });
        }

    </script>
</body>

</html>
