<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Smart Grocer Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }

        .sidebar {
            transition: all 0.3s ease;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="sidebar w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold"><i class="fas fa-bolt text-yellow-400 mr-2"></i> SmartGrocer SaaS</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-3">
                <li>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg text-white">
                        <i class="fas fa-tachometer-alt"></i>
                        <span data-translate="nav_dashboard">الرئيسية</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/users.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition">
                        <i class="fas fa-users"></i>
                        <span data-translate="nav_stores">المتاجر المشتركة</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/payments.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition">
                        <i class="fas fa-money-check-alt"></i><span data-translate="nav_payments">طرق الدفع</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/settings.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition">
                        <i class="fas fa-cogs"></i>
                        <span data-translate="nav_settings">إعدادات النظام</span>
                    </a>
                </li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-600/10 text-red-500 rounded-lg hover:bg-red-600 hover:text-white transition">
                <i class="fas fa-sign-out-alt"></i>
                <span data-translate="nav_logout">تسجيل خروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white border-b flex items-center justify-between px-6">
            <div class="flex items-center gap-4">
                <button class="md:hidden text-gray-500 hover:text-gray-700">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 class="text-xl font-semibold text-gray-800" data-translate="overview">نظرة عامة</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleAdminLang()" id="adminLangBtn"
                    class="px-3 py-1 bg-gray-100 text-gray-700 rounded-lg text-sm font-semibold hover:bg-gray-200 transition border">English</button>
                <div class="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
                    A
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-6">

            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1" data-translate="statStores">المتاجر النشطة</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-stores">-</h3>
                    </div>
                    <div
                        class="h-12 w-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 text-xl">
                        <i class="fas fa-store"></i>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1" data-translate="statSubs">الاشتراكات الفعالة</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-subs">-</h3>
                    </div>
                    <div
                        class="h-12 w-12 rounded-full bg-green-50 flex items-center justify-center text-green-600 text-xl">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 mb-1" data-translate="statPlans">إجمالي الباقات</p>
                        <h3 class="text-3xl font-bold text-gray-800" id="stat-plans">-</h3>
                    </div>
                    <div
                        class="h-12 w-12 rounded-full bg-purple-50 flex items-center justify-center text-purple-600 text-xl">
                        <i class="fas fa-layer-group"></i>
                    </div>
                </div>
            </div>

            <!-- Charts Section (Placeholder for aesthetics) -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                    <h4 class="font-semibold text-gray-800 mb-4" data-translate="chartTitle">نمو المشتركين</h4>
                    <div class="relative flex-1 w-full" style="min-height: 250px;">
                        <canvas id="growthChart"></canvas>
                    </div>
                </div>
                <!-- Mini Table -->
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-semibold text-gray-800" data-translate="latest">أحدث المتاجر</h4>
                        <a href="/admin/users.html" class="text-sm text-blue-600 hover:underline"
                            data-translate="viewAll">عرض الكل</a>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-right text-sm text-gray-500">
                            <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                                <tr>
                                    <th class="px-4 py-3" data-translate="th_name">اسم المتجر</th>
                                    <th class="px-4 py-3" data-translate="th_status">الحالة</th>
                                </tr>
                            </thead>
                            <tbody id="latestStoresTable">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login.html';
        }

        // Basic Localization Logic
        let adminLang = localStorage.getItem('sg_admin_lang') || 'ar';
        const dict = {
            ar: {
                langBtn: 'English', dir: 'rtl', overview: 'نظرة عامة',
                nav_dashboard: 'الرئيسية', nav_stores: 'المتاجر المشتركة', nav_payments: 'طرق الدفع', nav_settings: 'إعدادات النظام', nav_logout: 'تسجيل خروج',
                statStores: 'المتاجر النشطة', statSubs: 'الاشتراكات الفعالة', statPlans: 'إجمالي الباقات',
                chartTitle: 'نمو المشتركين', latest: 'أحدث المتاجر', viewAll: 'عرض الكل', th_name: 'اسم المتجر', th_status: 'الحالة', active: 'نشط', suspended: 'موقوف'
            },
            en: {
                langBtn: 'عربي', dir: 'ltr', overview: 'Overview',
                nav_dashboard: 'Dashboard', nav_stores: 'Stores', nav_payments: 'Payments', nav_settings: 'Settings', nav_logout: 'Logout',
                statStores: 'Active Stores', statSubs: 'Active Subscriptions', statPlans: 'Total Plans',
                chartTitle: 'Subscriber Growth', latest: 'Latest Stores', viewAll: 'View All', th_name: 'Store Name', th_status: 'Status', active: 'Active', suspended: 'Suspended'
            }
        };

        function applyAdminLang() {
            document.documentElement.dir = dict[adminLang].dir;
            document.getElementById('adminLangBtn').textContent = dict[adminLang].langBtn;

            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if (dict[adminLang][key]) {
                    el.textContent = dict[adminLang][key];
                }
            });

            // Fix text alignment for LTR
            if (adminLang === 'en') {
                document.querySelectorAll('.text-right').forEach(el => {
                    el.classList.remove('text-right');
                    el.classList.add('text-left');
                });
            } else {
                document.querySelectorAll('.text-left').forEach(el => {
                    el.classList.remove('text-left');
                    el.classList.add('text-right');
                });
            }
        }

        function toggleAdminLang() {
            adminLang = adminLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('sg_admin_lang', adminLang);
            applyAdminLang();
            window.location.reload();
        }

        applyAdminLang();

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminData');
            window.location.href = '/admin/login.html';
        }

        async function fetchDashboardStats() {
            try {
                const res = await fetch('/api/admin/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }

                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-stores').textContent = data.data.totalUsers;
                    document.getElementById('stat-subs').textContent = data.data.activeSubscriptions;
                    document.getElementById('stat-plans').textContent = data.data.totalPlans;

                    // Render the chart with real data
                    renderGrowthChart(data.data.growthData);
                }

                // Fetch latest stores
                const usersRes = await fetch('/api/admin/users', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const usersData = await usersRes.json();
                if (usersData.success && usersData.data.length > 0) {
                    const latest = usersData.data.slice(0, 5); // get top 5
                    const tbody = document.getElementById('latestStoresTable');
                    tbody.innerHTML = latest.map(user => `
                        <tr class="border-b">
                            <td class="px-4 py-3 font-medium text-gray-900">${user.storeName}</td>
                            <td class="px-4 py-3">
                                <span class="px-2 py-1 rounded-full text-xs font-medium ${user.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${user.status === 'active' ? dict[adminLang].active : dict[adminLang].suspended}
                                </span>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                console.error("Error fetching stats:", err);
            }
        }

        fetchDashboardStats();

        // Dummy Chart setup replaced with real data
        let growthChartInstance = null;

        function renderGrowthChart(growthData) {
            const ctx = document.getElementById('growthChart').getContext('2d');

            const monthNames = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
            const labels = [];
            const data = [];

            if (growthData && growthData.length > 0) {
                growthData.forEach(item => {
                    labels.push(monthNames[item._id.month - 1]);
                    data.push(item.count);
                });
            } else {
                labels.push('لا توجد بيانات');
                data.push(0);
            }

            if (growthChartInstance) growthChartInstance.destroy();

            growthChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'الاشتراكات الجديدة',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>

</html>
