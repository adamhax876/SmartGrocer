<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تذاكر الدعم | SmartGrocer Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }

        .ticket-card {
            transition: all 0.3s ease;
        }

        .ticket-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-xl font-bold"><i class="fas fa-bolt text-yellow-400 mr-2"></i> SmartGrocer SaaS</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-2 px-3">
                <li><a href="/admin/dashboard.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition"><i
                            class="fas fa-tachometer-alt"></i><span>الرئيسية</span></a></li>
                <li><a href="/admin/users.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition"><i
                            class="fas fa-store"></i><span>المتاجر المشتركة</span></a></li>
                <li><a href="/admin/payments.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition"><i
                            class="fas fa-money-check-alt"></i><span>طرق الدفع</span></a></li>
                <li><a href="/admin/settings.html"
                        class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition"><i
                            class="fas fa-cogs"></i><span>إعدادات النظام</span></a></li>
                <li><a href="/admin/tickets.html"
                        class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg text-white"><i
                            class="fas fa-life-ring"></i><span>تذاكر الدعم</span></a></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button onclick="logout()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-600/10 text-red-500 rounded-lg hover:bg-red-600 hover:text-white transition"><i
                    class="fas fa-sign-out-alt"></i><span>تسجيل خروج</span></button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shrink-0">
            <h2 class="text-xl font-semibold text-gray-800">تذاكر الدعم الفني</h2>
            <div class="flex gap-2">
                <button class="px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition"
                    onclick="filterTickets('all')" id="btnFilterAll">الكل</button>
                <button
                    class="px-4 py-2 bg-white text-yellow-600 border border-yellow-500 rounded-lg font-semibold hover:bg-yellow-50 transition"
                    onclick="filterTickets('open')" id="btnFilterOpen">تنتظر الرد</button>
                <button
                    class="px-4 py-2 bg-white text-green-600 border border-green-500 rounded-lg font-semibold hover:bg-green-50 transition"
                    onclick="filterTickets('answered')" id="btnFilterAns">مجاب عليها</button>
            </div>
        </header>

        <div
            class="flex-1 overflow-y-auto p-6 bg-gray-50 border-t border-gray-200 shadow-[inset_0_2px_4px_rgba(0,0,0,0.02)] pt-10">
            <div class="max-w-5xl mx-auto space-y-4" id="ticketsContainer">
                <div class="text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl"></i> جاري تحميل
                    التذاكر...</div>
            </div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin/login.html';

        function logout() { localStorage.removeItem('adminToken'); window.location.href = '/admin/login.html'; }

        async function adminApi(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
            const res = await fetch(url, options);
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || 'Server error');
            return data;
        }

        let allTickets = [];

        async function loadTickets() {
            try {
                const res = await adminApi('/api/admin/tickets');
                allTickets = res.tickets || [];
                renderTickets(allTickets);
            } catch (error) {
                Swal.fire('خطأ', 'فشل تحميل التذاكر', 'error');
            }
        }

        function filterTickets(status) {
            const btnAll = document.getElementById('btnFilterAll');
            const btnOpen = document.getElementById('btnFilterOpen');
            const btnAns = document.getElementById('btnFilterAns');

            // Reset all to outline
            btnAll.className = 'px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg font-semibold hover:bg-gray-50 transition';
            btnOpen.className = 'px-4 py-2 bg-white text-yellow-600 border border-yellow-500 rounded-lg font-semibold hover:bg-yellow-50 transition';
            btnAns.className = 'px-4 py-2 bg-white text-green-600 border border-green-500 rounded-lg font-semibold hover:bg-green-50 transition';

            // Set active
            if (status === 'all') btnAll.className = 'px-4 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition';
            if (status === 'open') btnOpen.className = 'px-4 py-2 bg-yellow-500 text-white rounded-lg font-semibold hover:bg-yellow-600 transition';
            if (status === 'answered') btnAns.className = 'px-4 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700 transition';

            if (status === 'all') {
                renderTickets(allTickets);
            } else {
                renderTickets(allTickets.filter(t => t.status === status));
            }
        }

        function renderTickets(tickets) {
            const container = document.getElementById('ticketsContainer');
            if (tickets.length === 0) {
                container.innerHTML = `<div class="bg-white p-8 rounded-xl shadow-sm text-center border"><i class="fas fa-inbox text-4xl text-gray-300 mb-3"></i><p class="text-gray-500">لا توجد تذاكر في هذا التصنيف.</p></div>`;
                return;
            }

            container.innerHTML = tickets.map(t => {
                const date = new Date(t.createdAt).toLocaleString('ar-EG');
                const user = t.userId || { fullName: 'مستخدم محذف', storeName: 'غير معروف', phone: '' };

                let statusBadge = t.status === 'open'
                    ? `<span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-sm font-bold border border-yellow-200"><i class="fas fa-clock mr-1"></i> تنتظر الرد</span>`
                    : `<span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-bold border border-green-200"><i class="fas fa-check mr-1"></i> تم الرد</span>`;

                let replyArea = '';
                if (t.status === 'open') {
                    replyArea = `
                        <div class="mt-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                            <h4 class="font-bold text-gray-700 mb-2"><i class="fas fa-reply text-blue-500 mr-1"></i> كتابة رد</h4>
                            <textarea id="reply-${t._id}" class="w-full text-gray-700 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" rows="3" placeholder="اكتب ردك هنا ليظهر للعميل..."></textarea>
                            <div class="mt-2 text-left shrink-0 pb-1">
                                <button class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-bold shadow-sm" onclick="sendReply('${t._id}')"><i class="fas fa-paper-plane mr-1"></i> إرسال الرد</button>
                            </div>
                        </div>
                    `;
                } else if (t.status === 'answered') {
                    const repliedAt = new Date(t.repliedAt).toLocaleString('ar-EG');
                    replyArea = `
                        <div class="mt-4 bg-green-50 p-4 rounded-lg border-r-4 border-green-500 text-gray-800">
                            <div class="flex justify-between items-center mb-2">
                                <span class="font-bold text-green-700"><i class="fas fa-shield-alt mr-1"></i> رد الإدارة</span>
                                <span class="text-xs text-gray-500">${repliedAt}</span>
                            </div>
                            <div class="leading-relaxed bg-white p-3 rounded border border-green-100">${t.adminReply}</div>
                        </div>
                    `;
                }

                return `
                    <div class="ticket-card bg-white p-5 rounded-xl border border-gray-200 shadow-sm relative">
                        <div class="flex justify-between items-start border-b border-gray-100 pb-4 mb-4">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900 mb-1">${t.subject}</h3>
                                <div class="flex gap-4 text-sm text-gray-500">
                                    <span><i class="fas fa-user text-gray-400"></i> ${user.fullName} (${user.storeName})</span>
                                    <span><i class="fas fa-phone text-gray-400"></i> <span dir="ltr">${user.phone || 'لا يوجد رقم'}</span></span>
                                    <span><i class="fas fa-calendar-alt text-gray-400"></i> ${date}</span>
                                </div>
                            </div>
                            <div>${statusBadge}</div>
                        </div>
                        <div class="text-gray-700 leading-relaxed bg-gray-50 p-4 rounded-lg text-lg">
                            ${t.message}
                        </div>
                        ${replyArea}
                    </div>
                `;
            }).join('');
        }

        async function sendReply(ticketId) {
            const replyText = document.getElementById(`reply-${ticketId}`).value.trim();
            if (!replyText) {
                Swal.fire('تنبيه', 'يجب كتابة الرد أولاً', 'warning');
                return;
            }

            try {
                const res = await adminApi(`/api/admin/tickets/${ticketId}/reply`, {
                    method: 'POST',
                    body: JSON.stringify({ reply: replyText })
                });

                Swal.fire('تم الإرسال', 'تم إرسال ردك للعميل بنجاح.', 'success');
                loadTickets();
            } catch (error) {
                Swal.fire('خطأ', error.message || 'فشل إرسال الرد', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', loadTickets);
    </script>
</body>

</html>
