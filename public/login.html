<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartGrocer — تسجيل الدخول</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cairo:wght@400;600;800&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #09090b;
      /* Very deep dark */
      color: #f8fafc;
      overflow: hidden;
      position: relative;
    }

    /* Premium Animated Background */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
      z-index: 0;
      filter: blur(40px);
      animation: pulseBg 10s ease-in-out infinite alternate;
    }

    @keyframes pulseBg {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }

      100% {
        transform: scale(1.1);
        opacity: 1;
      }
    }

    .auth-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 3rem;
      background: rgba(24, 24, 27, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-container {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
      margin-bottom: 1.5rem;
      position: relative;
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 22px;
      background: linear-gradient(135deg, #4f46e5, transparent, #3b82f6);
      z-index: -1;
      opacity: 0.5;
      animation: rotateGlow 4s linear infinite;
    }

    @keyframes rotateGlow {
      100% {
        transform: rotate(360deg);
      }
    }

    .auth-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      font-size: 0.95rem;
      color: #94a3b8;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: #4f46e5;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
    }

    .form-input::placeholder {
      color: #475569;
    }

    .btn-primary {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
      margin-top: 1rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(79, 70, 229, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.95rem;
      color: #94a3b8;
    }

    .auth-link {
      color: #818cf8;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .auth-link:hover {
      color: #a5b4fc;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      text-align: center;
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: none;
    }

    .top-lang {
      position: absolute;
      top: 2rem;
      right: 2rem;
      z-index: 20;
    }

    [dir="rtl"] .top-lang {
      right: auto;
      left: 2rem;
    }

    .lang-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      font-family: inherit;
      font-weight: 600;
      transition: all 0.3s;
    }

    .lang-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>

<body>

  <div class="bg-gradient"></div>

  <div class="top-lang">
    <button onclick="toggleLanguage()" class="lang-btn" id="langToggle">English</button>
  </div>

  <div class="auth-card">
    <div class="logo-container">
      <div class="logo-icon">🛒</div>
      <h1 class="auth-title" data-i18n="title">مرحباً بك مجدداً</h1>
      <p class="auth-subtitle" data-i18n="subtitle">قم بتسجيل الدخول للوصول إلى لوحة التحكم الخاصة بمتجرك</p>
    </div>

    <div class="error-message" id="errorBox"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" data-i18n="label_email">البريد الإلكتروني</label>
        <input type="email" class="form-input" id="email" required placeholder="admin@store.com">
      </div>

      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <label class="form-label" style="margin-bottom: 0;" data-i18n="label_pass">كلمة المرور</label>
          <a href="/forgot-password.html" class="auth-link" style="font-size: 0.85rem;" data-i18n="forgot_pass">نسيت
            الكلمة؟</a>
        </div>
        <input type="password" class="form-input" id="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-primary" id="loginBtn" data-i18n="btn_login">تسجيل الدخول</button>
    </form>

    <div class="auth-footer">
      <span data-i18n="no_acc">ليس لديك متجر بعد؟</span>
      <a href="/signup.html" class="auth-link" data-i18n="create_acc">ابدأ مجاناً الآن</a>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    const translations = {
      en: {
        title: "Welcome Back",
        subtitle: "Sign in to access your store's dashboard",
        label_email: "Email Address",
        label_pass: "Password",
        forgot_pass: "Forgot Password?",
        btn_login: "Sign In",
        no_acc: "Don't have a store yet?",
        create_acc: "Start for Free",
        err_login: "Invalid email or password",
        btn_loading: "Signing in..."
      },
      ar: {
        title: "مرحباً بك مجدداً",
        subtitle: "قم بتسجيل الدخول للوصول إلى لوحة التحكم الخاصة بمتجرك",
        label_email: "البريد الإلكتروني",
        label_pass: "كلمة المرور",
        forgot_pass: "نسيت الكلمة؟",
        btn_login: "تسجيل الدخول",
        no_acc: "ليس لديك متجر بعد؟",
        create_acc: "ابدأ مجاناً الآن",
        err_login: "البريد الإلكتروني أو كلمة المرور غير صحيحة",
        btn_loading: "جاري الدخول..."
      }
    };

    let currentLang = localStorage.getItem('sg_lang') || 'ar';
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.documentElement.lang = currentLang;
    document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';

    function updateTexts() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang] && translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
          if (el.tagName === 'INPUT') el.placeholder = translations[currentLang][key];
        }
      });
    }
    updateTexts();

    function toggleLanguage() {
      currentLang = currentLang === 'en' ? 'ar' : 'en';
      localStorage.setItem('sg_lang', currentLang);
      document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = currentLang;
      document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
      updateTexts();
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
      setTimeout(() => box.style.display = 'none', 4000);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const ogText = btn.textContent;

      btn.disabled = true;
      btn.textContent = translations[currentLang].btn_loading;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        btn.disabled = false;
        btn.textContent = ogText;

        if (!res.ok) throw new Error(data.message || translations[currentLang].err_login);

        // Set user tokens
        localStorage.setItem('sg_token', data.token);
        localStorage.setItem('sg_user', JSON.stringify(data.user));

        if (data.user.role === 'admin') {
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminData', JSON.stringify(data.user));
          window.location.href = '/admin/dashboard.html';
        } else if (data.user.role === 'support') {
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminData', JSON.stringify(data.user));
          window.location.href = '/admin/tickets.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = ogText;
      }
    }
  </script>
</body>

</html>
