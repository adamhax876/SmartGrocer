<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrocer — تسجيل الدخول</title>
    <!-- Use global stylesheet which handles Light/Dark theme variables -->
    <link rel="stylesheet" href="/css/global.css?v=1777063295034">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            padding: 2rem;
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-lg);
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            color: var(--primary);
        }
        .auth-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .form-group {
            text-align: right;
            margin-bottom: 1.5rem;
        }
        body.ltr .form-group { text-align: left; }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text);
        }
        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-input);
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            margin-top: 0.5rem;
        }
        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-link {
            color: var(--blue);
            font-weight: 700;
            transition: color 0.3s;
        }
        .auth-link:hover { color: var(--primary); }
        .error-message {
            background: var(--red-light);
            color: var(--red);
            padding: 0.8rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border: 1px solid var(--red);
            display: none;
        }
        .header-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .header-btn:hover { background: var(--bg-input); }
        .header-actions { display: flex; gap: 0.5rem; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <!-- Top Navigation -->
        <div class="top-bar">
            <div>
                <a href="/index.html" class="header-btn" id="homeLink">
                    <i class="fas fa-arrow-right rtl-icon"></i>
                    <i class="fas fa-arrow-left ltr-icon" style="display:none;"></i>
                    <span data-i18n="back_home">الرئيسية</span>
                </a>
            </div>
            <div class="header-actions">
                <button onclick="toggleLanguage()" class="header-btn" id="langToggle">English</button>
                <button onclick="toggleTheme()" class="header-btn" id="theme-toggle">🌙</button>
            </div>
        </div>

        <!-- Main Card -->
        <div class="auth-card">
            <div class="logo-icon"><i class="fas fa-store"></i></div>
            <h1 class="auth-title" data-i18n="title">مرحباً بك مجدداً</h1>
            <p class="auth-subtitle" data-i18n="subtitle">قم بتسجيل الدخول للوصول إلى لوحة التحكم الخاصة بمتجرك</p>

            <div class="error-message" id="errorBox"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" data-i18n="label_email">البريد الإلكتروني</label>
                    <input type="email" class="form-input" id="email" required placeholder="you@email.com">
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label class="form-label" style="margin-bottom: 0;" data-i18n="label_pass">كلمة المرور</label>
                        <a href="/forgot-password.html" class="auth-link" style="font-size: 0.85rem;" data-i18n="forgot_pass">نسيت الكلمة؟</a>
                    </div>
                    <input type="password" class="form-input" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary btn-auth" id="loginBtn" data-i18n="btn_login">تسجيل الدخول</button>
            </form>

            <div class="auth-footer">
                <span data-i18n="no_acc">ليس لديك متجر بعد؟</span>
                <a href="/signup.html" class="auth-link" data-i18n="create_acc">ابدأ مجاناً الآن</a>
            </div>
        </div>
    </div>

    <!-- Script that imports the global language/theme handlers and performs API logic -->
    <script src="/js/app.js?v=1777063295034"></script>
    <script>
        const translations = {
            en: {
                title: "Welcome Back",
                subtitle: "Sign in to access your store's dashboard",
                label_email: "Email Address",
                label_pass: "Password",
                forgot_pass: "Forgot Password?",
                btn_login: "Sign In",
                no_acc: "Don't have a store yet?",
                create_acc: "Start for Free",
                err_login: "Invalid email or password",
                btn_loading: "Signing in...",
                back_home: "Homepage"
            },
            ar: {
                title: "مرحباً بك مجدداً",
                subtitle: "قم بتسجيل الدخول للوصول إلى لوحة التحكم الخاصة بمتجرك",
                label_email: "البريد الإلكتروني",
                label_pass: "كلمة المرور",
                forgot_pass: "نسيت الكلمة؟",
                btn_login: "تسجيل الدخول",
                no_acc: "ليس لديك متجر بعد؟",
                create_acc: "ابدأ مجاناً الآن",
                err_login: "البريد الإلكتروني أو كلمة المرور غير صحيحة",
                btn_loading: "جاري الدخول...",
                back_home: "الرئيسية"
            }
        };

        // Theme and Lang Initialization
        document.addEventListener('DOMContentLoaded', () => {
            const currentTheme = getTheme();
            document.documentElement.setAttribute('data-theme', currentTheme);
            updateThemeIcon(currentTheme);

            const currentLang = localStorage.getItem('sg_lang') || 'ar';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.body.className = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            updateTexts();
            updateIconsForLang();
        });

        function updateIconsForLang() {
            const dir = document.documentElement.dir;
            if (dir === 'rtl') {
                document.querySelector('.rtl-icon').style.display = 'inline-block';
                document.querySelector('.ltr-icon').style.display = 'none';
            } else {
                document.querySelector('.rtl-icon').style.display = 'none';
                document.querySelector('.ltr-icon').style.display = 'inline-block';
            }
        }

        function updateTexts() {
            const currentLang = localStorage.getItem('sg_lang') || 'ar';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                    if (el.tagName === 'INPUT') el.placeholder = translations[currentLang][key];
                }
            });
        }

        function toggleLanguage() {
            let currentLang = localStorage.getItem('sg_lang') || 'ar';
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('sg_lang', currentLang);
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.body.className = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            updateTexts();
            updateIconsForLang();
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.textContent = msg;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 4000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const currentLang = localStorage.getItem('sg_lang') || 'ar';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const ogText = btn.textContent;

            btn.disabled = true;
            btn.textContent = translations[currentLang].btn_loading;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                btn.disabled = false;
                btn.textContent = ogText;

                if (!res.ok) throw new Error(data.message || translations[currentLang].err_login);

                localStorage.setItem('sg_token', data.token);
                localStorage.setItem('sg_user', JSON.stringify(data.user));

                if (data.user.role === 'admin') {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminData', JSON.stringify(data.user));
                    window.location.href = '/admin/dashboard.html';
                } else if (data.user.role === 'support') {
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminData', JSON.stringify(data.user));
                    window.location.href = '/admin/tickets.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                showError(err.message);
                btn.disabled = false;
                btn.textContent = ogText;
            }
        }
    </script>
</body>
</html>
