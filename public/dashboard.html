<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrocer — لوحة التحكم</title>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-inline-end: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s;
        }

        .sidebar::-webkit-scrollbar {
            width: 0px;
            /* Remove scrollbar space */
            background: transparent;
            /* Optional: just make scrollbar invisible */
        }

        /* Optional: show scrollbar when hovering if desired */
        .sidebar:hover::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 4px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            padding: 0 .5rem;
        }

        .sidebar-logo-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .sidebar-logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem .85rem;
            border-radius: 10px;
            font-size: .92rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all .2s;
            text-decoration: none;
        }

        .sidebar-link:hover {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .sidebar-link.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
        }

        .sidebar-link span:first-child {
            font-size: 1.15rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-bottom {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .main {
            flex: 1;
            margin-inline-start: 260px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        .topbar-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .content {
            padding: 2rem;
            flex: 1;
            background: var(--bg);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            padding: 1.5rem;
            text-align: center;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .kpi-card h3 {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .chart-card {
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
                position: fixed;
                top: 0;
                right: 0;
                bottom: 0;
                width: 260px;
                z-index: 200;
            }
            body[dir="ltr"] .sidebar {
                transform: translateX(-100%);
                left: 0;
                right: auto;
            }
            .sidebar.open {
                transform: translateX(0) !important;
            }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 199;
            }
            .sidebar-overlay.active {
                display: block;
            }
            .main {
                margin-inline-start: 0;
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .topbar {
                padding: 0.8rem 1rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            .topbar-actions {
                gap: 0.4rem;
                flex-wrap: wrap;
            }
            .content {
                padding: 1rem;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }
            .kpi-card {
                padding: 0.8rem;
            }
            .kpi-value {
                font-size: 1.4rem;
            }
            .hamburger {
                display: flex !important;
            }
        }
        .hamburger {
            display: none;
            width: 40px; height: 40px;
            align-items: center; justify-content: center;
            border: 1px solid var(--border); border-radius: 10px;
            background: var(--bg-secondary);
            cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>

<body class="light">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/images/logo.png" style="width: 100%; max-height: 100px; object-fit: contain;" alt="Logo">

            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-link active"><span class="icon">📊</span> <span
                        data-i18n="nav_dashboard">لوحة التحكم</span></a>
                <a href="/products.html" class="sidebar-link"><span class="icon">📦</span> <span
                        data-i18n="nav_products">المنتجات</span></a>
                <a href="/inventory.html" class="sidebar-link"><span class="icon">📋</span> <span
                        data-i18n="nav_inventory">المخزون</span></a>
                <a href="/pos.html" class="sidebar-link"><span class="icon">💻</span> <span data-i18n="nav_pos">نقطة
                        البيع (POS)</span></a>
                <a href="/sales.html" class="sidebar-link"><span class="icon">💰</span> <span
                        data-i18n="nav_sales">المبيعات</span></a>
                <a href="/reports.html" class="sidebar-link"><span class="icon">📈</span> <span
                        data-i18n="nav_reports">التقارير</span></a>
                <a href="/support.html" class="sidebar-link"><span class="icon">🎧</span> <span
                        data-i18n="nav_support">الدعم الفني</span></a>
            </nav>
            <div class="sidebar-bottom">
                <button onclick="window.location.href='/'" class="btn btn-primary"
                    style="width: 100%; margin-bottom: 10px;" data-i18n="btn_home">🏠 الرئيسية</button>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%; margin-bottom: 10px;" data-i18n="btn_logout">تسجيل الخروج</button>
                <button onclick="promptDeleteAccount()" class="btn btn-outline" style="width: 100%; border-color: var(--error); color: var(--error);" data-i18n="btn_delete_account">حذف حساب المتجر</button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:0.5rem">
                    <button class="hamburger" onclick="toggleSidebar()">☰</button>
                    <h1 class="topbar-title" data-i18n="title_dashboard">نظرة عامة</h1>
                </div>
                <div class="topbar-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <button onclick="toggleTheme()" class="btn btn-outline" id="theme-toggle"
                        style="border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0;">🌓</button>
                    <button onclick="toggleLanguage()" class="btn btn-outline" id="langToggle"
                        style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">English</button>
                    <button onclick="window.location.href='/billing.html'" class="btn btn-primary" id="btnUpgrade"
                        style="padding: 0.4rem 1rem; font-size: 0.9rem; font-weight: bold;"
                        data-i18n="btn_upgrade">ترقية الباقة 🚀</button>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2;">
                        <span id="userGreeting" style="font-weight: bold; color: var(--text);">مرحباً</span>
                        <span id="planBadge"
                            style="font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 12px; background: #dcfce7; color: #166534; display: none;"></span>
                    </div>
                </div>
            </header>
            <div class="content">
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_revenue">إجمالي المبيعات</h3>
                        <div id="stats-revenue" class="kpi-value"></div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_orders">الطلبات</h3>
                        <div id="stats-orders" class="kpi-value" style="color: var(--text);">0</div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_low_stock">تنبيهات المخزون</h3>
                        <div id="stats-low-stock" class="kpi-value" style="color: var(--error);">0</div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_products">إجمالي المنتجات</h3>
                        <div id="stats-products" class="kpi-value" style="color: var(--text);">0</div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                            <h2 style="margin: 0; color: var(--text); font-size: 1.1rem;" data-i18n="chart_sales">المبيعات الشهرية</h2>
                            <span style="font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; background: rgba(79,70,229,0.1); color: #4F46E5; font-weight: 600;">📊 MONTHLY</span>
                        </div>
                        <canvas id="revenueChart" height="300"></canvas>
                    </div>
                    <div class="chart-card">
                        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;">
                            <h2 style="margin: 0; color: var(--text); font-size: 1.1rem;" data-i18n="chart_categories">توزيع الفئات</h2>
                            <span style="font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; background: rgba(16,185,129,0.1); color: #10b981; font-weight: 600;">🏷️ CATEGORIES</span>
                        </div>
                        <canvas id="categoryChart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('active');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/user-lang.js"></script>
    <script src="/js/app.js"></script>
    <script>

        document.addEventListener('DOMContentLoaded', async () => {
            if (!getToken()) {
                window.location.href = '/login.html';
                return;
            }

            const user = getUser();
            document.getElementById('userGreeting').textContent = currentUserLang === 'ar' ? `مرحباً، ${user.fullName || ''}` : `Hello, ${user.fullName || ''}`;

            try {
                // Fetch full fresh user details
                const meData = await api('/api/auth/me');
                if (meData && meData.user) {
                    const planBadge = document.getElementById('planBadge');
                    planBadge.style.display = 'inline-block';

                    let planText = meData.user.subscriptionPlan || 'Free Trial';
                    const endDate = new Date(meData.user.subscriptionEndDate);
                    const isActive = endDate > new Date();
                    const upgBtn = document.getElementById('btnUpgrade');

                    if (upgBtn) {
                        if (planText === 'Pro Plan' && isActive) {
                            upgBtn.style.display = 'none';
                        } else if (!isActive) {
                            upgBtn.textContent = currentUserLang === 'ar' ? 'تجديد الباقة 🚀' : 'Renew Plan 🚀';
                            upgBtn.style.background = '#dc2626'; // Alert color
                        }
                    }

                    if (planText === 'Free Trial') {
                        const daysLeft = Math.floor((endDate - new Date()) / (1000 * 60 * 60 * 24));
                        planText = currentUserLang === 'ar' ? `تجربة مجانية (${daysLeft > 0 ? daysLeft : 0} يوم)` : `Free Trial (${daysLeft > 0 ? daysLeft : 0} days left)`;
                        planBadge.style.background = '#fef3c7';
                        planBadge.style.color = '#92400e';
                    } else {
                        planBadge.style.background = '#dbeafe';
                        planBadge.style.color = '#1e40af';
                        planText = currentUserLang === 'ar' && planText === 'Basic Plan' ? 'الباقة الأساسية' :
                            currentUserLang === 'ar' && planText === 'Pro Plan' ? 'الباقة الاحترافية' : planText;
                    }
                    planBadge.textContent = planText;
                }

                const data = await api('/api/reports/overview');

                // Update stats
                document.getElementById('stats-revenue').innerHTML = formatMoney(data.sales.totalRevenue);
                document.getElementById('stats-orders').textContent = data.sales.totalTransactions;
                document.getElementById('stats-low-stock').textContent = data.products.lowStock;
                document.getElementById('stats-products').textContent = data.products.total;

                const themeStr = typeof getTheme === 'function' ? getTheme() : localStorage.getItem('sg_theme') || 'light';
                Chart.defaults.color = themeStr === 'dark' ? '#94a3b8' : '#64748b';
                Chart.defaults.borderColor = themeStr === 'dark' ? '#334155' : '#e2e8f0';
                Chart.defaults.font.family = 'Cairo, sans-serif';

                // Monthly Revenue — Premium Gradient Bar Chart
                const revCtx = document.getElementById('revenueChart').getContext('2d');
                const barGrad = revCtx.createLinearGradient(0, 0, 0, 300);
                barGrad.addColorStop(0, '#4F46E5');
                barGrad.addColorStop(1, '#818cf8');

                const monthKeys = Object.keys(data.monthlyRevenue);
                const shortMonths = monthKeys.map(m => {
                    const parts = m.split('-');
                    const monthNames = currentUserLang === 'ar' 
                        ? ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر']
                        : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    return monthNames[parseInt(parts[1]) - 1] || m;
                });

                new Chart(revCtx, {
                    type: 'bar',
                    data: {
                        labels: shortMonths,
                        datasets: [{
                            label: currentUserLang === 'ar' ? 'المبيعات' : 'Sales',
                            data: Object.values(data.monthlyRevenue),
                            backgroundColor: barGrad,
                            borderRadius: 10,
                            borderSkipped: false,
                            barPercentage: 0.55,
                            hoverBackgroundColor: '#6366f1'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: themeStr === 'dark' ? '#1e293b' : '#fff',
                                titleColor: themeStr === 'dark' ? '#e2e8f0' : '#1e293b',
                                bodyColor: themeStr === 'dark' ? '#94a3b8' : '#64748b',
                                borderColor: themeStr === 'dark' ? '#334155' : '#e2e8f0',
                                borderWidth: 1,
                                cornerRadius: 10,
                                padding: 12,
                                callbacks: {
                                    label: ctx => (currentUserLang === 'ar' ? 'المبيعات: ' : 'Sales: ') + ctx.parsed.y.toLocaleString()
                                }
                            }
                        },
                        scales: {
                            x: { grid: { display: false } },
                            y: { beginAtZero: true, grid: { color: themeStr === 'dark' ? '#1e293b' : '#f1f5f9' }, ticks: { callback: v => v.toLocaleString() } }
                        }
                    }
                });

                // Category Chart — Premium Doughnut with Legend
                const catData = data.categories;
                const catMapAr = { 'groceries': 'بقالة', 'dairy': 'ألبان وأجبان', 'meat': 'لحوم ومجمدات', 'beverages': 'مشروبات وعصائر', 'snacks': 'تسالي وحلويات' };
                const catMapEn = { 'groceries': 'Groceries', 'dairy': 'Dairy & Cheese', 'meat': 'Meat & Frozen', 'beverages': 'Beverages', 'snacks': 'Snacks & Sweets' };
                const catLabels = Object.keys(catData).map(k => currentUserLang === 'ar' ? (catMapAr[k] || k) : (catMapEn[k] || k));
                const catValues = Object.values(catData).map(c => c.products);
                const catColors = ['#4F46E5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#ec4899', '#14b8a6'];

                const catCtx = document.getElementById('categoryChart');
                new Chart(catCtx, {
                    type: 'doughnut',
                    data: {
                        labels: catLabels,
                        datasets: [{
                            data: catValues,
                            backgroundColor: catColors.slice(0, catLabels.length),
                            borderWidth: 3,
                            borderColor: themeStr === 'dark' ? '#1e293b' : '#ffffff',
                            hoverOffset: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        cutout: '65%',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    usePointStyle: true,
                                    pointStyle: 'circle',
                                    padding: 16,
                                    font: { size: 12 }
                                }
                            },
                            tooltip: {
                                backgroundColor: themeStr === 'dark' ? '#1e293b' : '#fff',
                                titleColor: themeStr === 'dark' ? '#e2e8f0' : '#1e293b',
                                bodyColor: themeStr === 'dark' ? '#94a3b8' : '#64748b',
                                borderColor: themeStr === 'dark' ? '#334155' : '#e2e8f0',
                                borderWidth: 1,
                                cornerRadius: 10,
                                padding: 12,
                                callbacks: {
                                    label: ctx => {
                                        const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                        const pct = total > 0 ? ((ctx.parsed / total) * 100).toFixed(1) : 0;
                                        return ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
                                    }
                                }
                            }
                        }
                    }
                });

            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        });

        async function promptDeleteAccount() {
            const confirmed = await Swal.fire({
                title: currentUserLang === 'ar' ? 'هل أنت متأكد من حذف حسابك؟' : 'Are you sure you want to delete your account?',
                text: currentUserLang === 'ar' ? "لن تتمكن من التراجع عن هذا الإجراء، وسيتم مسح كل بيانات متجرك نهائياً!" : "You will not be able to undo this action, and all your store data will be deleted permanently!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3b82f6',
                confirmButtonText: currentUserLang === 'ar' ? 'نعم، احذف حسابي النهائي' : 'Yes, delete my account',
                cancelButtonText: currentUserLang === 'ar' ? 'إلغاء' : 'Cancel'
            });

            if (confirmed.isConfirmed) {
                try {
                    Swal.fire({
                        title: currentUserLang === 'ar' ? 'جاري الحذف...' : 'Deleting...',
                        didOpen: () => { Swal.showLoading() }
                    });
                    
                    const res = await api('/api/auth/account', { method: 'DELETE' });
                    if (res && res.success) {
                        await Swal.fire(
                            currentUserLang === 'ar' ? 'تم الوداع' : 'Goodbye',
                            res.message,
                            'success'
                        );
                        localStorage.clear();
                        window.location.href = '/login.html';
                    } else {
                        throw new Error(res?.message || 'Failed to delete');
                    }
                } catch (err) {
                    Swal.fire(currentUserLang === 'ar' ? 'خطأ' : 'Error', err.message, 'error');
                }
            }
        }
    </script>
</body>

</html>
