<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrocer — لوحة التحكم</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-inline-end: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            padding: 0 .5rem;
        }

        .sidebar-logo-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .sidebar-logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem .85rem;
            border-radius: 10px;
            font-size: .92rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all .2s;
            text-decoration: none;
        }

        .sidebar-link:hover {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .sidebar-link.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
        }

        .sidebar-link span:first-child {
            font-size: 1.15rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-bottom {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .main {
            flex: 1;
            margin-inline-start: 260px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        .topbar-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .content {
            padding: 2rem;
            flex: 1;
            background: var(--bg);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            padding: 1.5rem;
            text-align: center;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .kpi-card h3 {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .chart-card {
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            border: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(100%);
            }

            .main {
                margin-inline-start: 0;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="light">
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/images/logo.png" style="height: 55px; width: auto; max-width: 180px; object-fit: contain;"
                    alt="Logo">
                <div class="sidebar-logo-text">SmartGrocer</div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-link active"><span class="icon">📊</span> <span
                        data-i18n="nav_dashboard">لوحة التحكم</span></a>
                <a href="/products.html" class="sidebar-link"><span class="icon">📦</span> <span
                        data-i18n="nav_products">المنتجات</span></a>
                <a href="/inventory.html" class="sidebar-link"><span class="icon">📋</span> <span
                        data-i18n="nav_inventory">المخزون</span></a>
                <a href="/pos.html" class="sidebar-link"><span class="icon">💻</span> <span data-i18n="nav_pos">نقطة
                        البيع (POS)</span></a>
                <a href="/sales.html" class="sidebar-link"><span class="icon">💰</span> <span
                        data-i18n="nav_sales">المبيعات</span></a>
                <a href="/reports.html" class="sidebar-link"><span class="icon">📈</span> <span
                        data-i18n="nav_reports">التقارير</span></a>
            </nav>
            <div class="sidebar-bottom">
                <button onclick="window.location.href='/'" class="btn btn-primary"
                    style="width: 100%; margin-bottom: 10px;" data-i18n="btn_home">🏠 الرئيسية</button>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;" data-i18n="btn_logout">تسجيل
                    الخروج</button>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1 class="topbar-title" data-i18n="title_dashboard">لوحة التحكم</h1>
                <div class="topbar-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <button onclick="toggleTheme()" class="btn btn-outline" id="theme-toggle"
                        style="border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0;">🌓</button>
                    <button onclick="toggleLanguage()" class="btn btn-outline" id="langToggle"
                        style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">English</button>
                    <span id="userGreeting" style="font-weight: bold; color: var(--text);">مرحباً</span>
                </div>
            </header>
            <div class="content">
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_revenue">إجمالي المبيعات</h3>
                        <div id="stats-revenue" class="kpi-value"></div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_orders">الطلبات</h3>
                        <div id="stats-orders" class="kpi-value" style="color: var(--text);">0</div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_low_stock">تنبيهات المخزون</h3>
                        <div id="stats-low-stock" class="kpi-value" style="color: var(--error);">0</div>
                    </div>
                    <div class="kpi-card">
                        <h3 data-i18n="kpi_products">إجمالي المنتجات</h3>
                        <div id="stats-products" class="kpi-value" style="color: var(--text);">0</div>
                    </div>
                </div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <h2 style="margin-bottom: 1rem; color: var(--text);" data-i18n="chart_sales">المبيعات الشهرية
                        </h2>
                        <canvas id="revenueChart" height="300"></canvas>
                    </div>
                    <div class="chart-card">
                        <h2 style="margin-bottom: 1rem; color: var(--text);" data-i18n="chart_categories">توزيع الفئات
                        </h2>
                        <canvas id="categoryChart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const translations = {
            en: {
                nav_dashboard: "Dashboard", nav_products: "Products", nav_inventory: "Inventory", nav_pos: "POS System", nav_sales: "Sales", nav_reports: "Reports",
                btn_theme: "Theme", btn_logout: "Logout",
                title_dashboard: "Dashboard Overview",
                kpi_revenue: "Total Revenue", kpi_orders: "Orders Count", kpi_low_stock: "Low Stock Alerts", kpi_products: "Total Products",
                chart_sales: "Monthly Sales", chart_categories: "Category Distribution"
            },
            ar: {
                nav_dashboard: "لوحة التحكم", nav_products: "المنتجات", nav_inventory: "المخزون", nav_pos: "نقطة البيع (POS)", nav_sales: "المبيعات", nav_reports: "التقارير",
                btn_theme: "المظهر", btn_logout: "تسجيل الخروج",
                title_dashboard: "نظرة عامة",
                kpi_revenue: "إجمالي المبيعات", kpi_orders: "الطلبات", kpi_low_stock: "تنبيهات المخزون", kpi_products: "إجمالي المنتجات",
                chart_sales: "المبيعات الشهرية", chart_categories: "توزيع الفئات"
            }
        };

        // Standard App Initialization
        let currentLang = localStorage.getItem('sg_lang') || 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
        const savedTheme = localStorage.getItem('sg_theme') || 'light';
        document.body.className = savedTheme;

        function updateTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
        }
        updateTexts();

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('sg_lang', currentLang);
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
            updateTexts();
            location.reload(); // Refresh charts
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!getToken()) {
                window.location.href = '/login.html';
                return;
            }

            const user = getUser();
            document.getElementById('userGreeting').textContent = currentLang === 'ar' ? `مرحباً، ${user.fullName || ''}` : `Hello, ${user.fullName || ''}`;

            try {
                const data = await api('/api/reports/overview');

                // Update stats
                document.getElementById('stats-revenue').innerHTML = formatMoney(data.sales.totalRevenue);
                document.getElementById('stats-orders').textContent = data.sales.totalTransactions;
                document.getElementById('stats-low-stock').textContent = data.products.lowStock;
                document.getElementById('stats-products').textContent = data.products.total;

                Chart.defaults.color = savedTheme === 'dark' ? '#94a3b8' : '#64748b';
                Chart.defaults.borderColor = savedTheme === 'dark' ? '#334155' : '#e2e8f0';

                // Revenue Chart
                const revCtx = document.getElementById('revenueChart');
                new Chart(revCtx, {
                    type: 'bar',
                    data: {
                        labels: Object.keys(data.monthlyRevenue),
                        datasets: [{
                            label: currentLang === 'ar' ? 'المبيعات' : 'Sales',
                            data: Object.values(data.monthlyRevenue),
                            backgroundColor: '#4F46E5',
                            borderRadius: 6
                        }]
                    }
                });

                // Category Chart
                const catCtx = document.getElementById('categoryChart');
                new Chart(catCtx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(data.categories),
                        datasets: [{
                            data: Object.values(data.categories).map(c => c.products),
                            backgroundColor: ['#4F46E5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                            borderWidth: 0
                        }]
                    }
                });

            } catch (error) {
                console.error('Error fetching dashboard data:', error);
            }
        });
    </script>
</body>

</html>
