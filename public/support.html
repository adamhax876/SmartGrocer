<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدعم الفني | SmartGrocer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .support-container {
            max-width: 1000px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 0 1rem;
        }

        .ticket-form {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ticket-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .ticket-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .badge-open {
            background: rgba(234, 179, 8, 0.1);
            color: #ca8a04;
        }

        .badge-answered {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .admin-reply {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(59, 130, 246, 0.05);
            border-right: 4px solid var(--primary);
            border-radius:
                4px;
        }

        @media (max-width: 768px) {
            .support-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body class="light">

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand">
            <span class="logo-icon">🛒</span>
            SmartGrocer
        </div>
        <div class="nav-links">
            <a href="/dashboard.html" class="nav-link"><i class="fas fa-home"></i> الرئيسية</a>
            <a href="/support.html" class="nav-link active"><i class="fas fa-life-ring"></i> الدعم الفني</a>
            <button onclick="toggleTheme()" class="btn btn-outline"><i class="fas fa-moon"></i></button>
            <button onclick="logout()" class="btn btn-outline"
                style="color: var(--error); border-color: var(--error);">تسجيل الخروج</button>
        </div>
    </nav>

    <div class="support-container">
        <!-- New Ticket Form -->
        <div class="ticket-form">
            <h2 style="margin-bottom: 1.5rem; color: var(--text);"><i class="fas fa-headset text-primary"></i> تذكرة
                جديدة</h2>

            <div class="form-group">
                <label>موضوع المشكلة</label>
                <input type="text" id="ticketSubject" class="form-input"
                    placeholder="مثال: مشكلة في الدفع، استفسار عن خطة..." required>
            </div>

            <div class="form-group">
                <label>تفاصيل المشكلة (رسالتك)</label>
                <textarea id="ticketMessage" class="form-input" rows="5" placeholder="اشرح مشكلتك بالتفصيل هنا..."
                    required></textarea>
            </div>

            <button onclick="submitTicket()" id="submitBtn" class="btn btn-primary"
                style="width: 100%; justify-content: center;">
                <i class="fas fa-paper-plane"></i> إرسال التذكرة
            </button>
        </div>

        <!-- Previous Tickets -->
        <div>
            <h2 style="margin-bottom: 1.5rem; color: var(--text);"><i class="fas fa-history text-primary"></i> تذاكري
                السابقة</h2>
            <div id="ticketsContainer" class="ticket-list">
                <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">جاري تحميل التذاكر...
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        document.body.className = localStorage.getItem('sg_theme') || 'light';

        async function loadTickets() {
            try {
                const res = await api('/api/support');
                const container = document.getElementById('ticketsContainer');

                if (!res.tickets || res.tickets.length === 0) {
                    container.innerHTML = `
                        <div style="text-align: center; background: var(--bg-card); border-radius: var(--radius); padding: 3rem; color: var(--text-secondary);">
                            <i class="fas fa-inbox" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                            <p>لا توجد لديك تذاكر دعم فني سابقة</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = res.tickets.map(ticket => {
                    const date = new Date(ticket.createdAt).toLocaleString('ar-EG');

                    let statusHtml = '';
                    if (ticket.status === 'open') {
                        statusHtml = '<span class="badge badge-open"><i class="fas fa-clock"></i> قيد الانتظار</span>';
                    } else if (ticket.status === 'answered') {
                        statusHtml = '<span class="badge badge-answered"><i class="fas fa-check-circle"></i> تم الرد</span>';
                    }

                    let replyHtml = '';
                    if (ticket.adminReply) {
                        const replyDate = new Date(ticket.repliedAt).toLocaleString('ar-EG');
                        replyHtml = `
                            <div class="admin-reply">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text-secondary);">
                                    <strong><i class="fas fa-user-shield"></i> رد الإدارة</strong>
                                    <span>${replyDate}</span>
                                </div>
                                <div style="color: var(--text); line-height: 1.6;">${ticket.adminReply}</div>
                            </div>
                        `;
                    }

                    return `
                        <div class="ticket-card">
                            <div class="ticket-header">
                                <h3 style="color: var(--text); font-size: 1.1rem;">${ticket.subject}</h3>
                                ${statusHtml}
                            </div>
                            <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">
                                <i class="fas fa-calendar-alt"></i> ${date}
                            </div>
                            <div style="color: var(--text); line-height: 1.6;">
                                ${ticket.message}
                            </div>
                            ${replyHtml}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        async function submitTicket() {
            const subject = document.getElementById('ticketSubject').value.trim();
            const message = document.getElementById('ticketMessage').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!subject || !message) {
                Swal.fire({ icon: 'warning', title: 'تنبيه', text: 'يرجى كتابة الموضوع والرسالة قبل الإرسال' });
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

            try {
                await api('/api/support', {
                    method: 'POST',
                    body: JSON.stringify({ subject, message })
                });

                document.getElementById('ticketSubject').value = '';
                document.getElementById('ticketMessage').value = '';

                Swal.fire({
                    icon: 'success',
                    title: 'تم الإرسال!',
                    text: 'تم إرسال تذكرتك لفريق الدعم بنجاح، سيتم الرد عليك في أسرع وقت.',
                    confirmButtonColor: '#10b981'
                });

                loadTickets();
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'خطأ', text: error.message || 'حدث خطأ أثناء الإرسال' });
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال التذكرة';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!getToken()) window.location.href = '/login.html';
            else loadTickets();
        });
    </script>
</body>

</html>
