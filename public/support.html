<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدعم الفني | SmartGrocer</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css?v=1776972693408">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .app {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--bg-card);
            border-inline-end: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
            transition: all 0.3s;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            padding: 0 .5rem;
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .7rem .85rem;
            border-radius: 10px;
            font-size: .92rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all .2s;
            text-decoration: none;
        }

        .sidebar-link:hover {
            background: var(--bg-secondary);
            color: var(--text);
        }

        .sidebar-link.active {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
        }

        .sidebar-bottom {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .main {
            flex: 1;
            margin-inline-start: 260px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: relative;
            z-index: 50;
        }

        .topbar-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
        }

        .support-container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 1rem;
        }

        .ticket-form {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            height: fit-content;
        }

        .ticket-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            height: calc(100vh - 150px);
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .ticket-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .ticket-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .badge-open {
            background: rgba(234, 179, 8, 0.1);
            color: #ca8a04;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .badge-answered {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .admin-reply {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(59, 130, 246, 0.05);
            border-right: 4px solid var(--primary);
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .sidebar.open { display: flex; }
            .main { margin-inline-start: 0 !important; }
            #ticketSidePanel { width: 100% !important; position: absolute; z-index: 40; height: 100%; }
            #ticketSidePanel.mobile-hidden { display: none !important; }
            .mobile-back-btn { display: flex !important; }
        }
        @media (min-width: 769px) {
            .mobile-back-btn { display: none !important; }
            .mobile-hamburger { display: none !important; }
        }
        .chat-bg-themed {
            background: var(--bg-secondary, #e5ddd5);
        }
    </style>
</head>

<body class="light">
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/images/logo.png" style="width: 100%; max-height: 100px; object-fit: contain;" alt="Logo">
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-link"><span class="icon">📊</span> <span
                        data-i18n="nav_dashboard">لوحة التحكم</span></a>
                <a href="/products.html" class="sidebar-link"><span class="icon">📦</span> <span
                        data-i18n="nav_products">المنتجات</span></a>
                <a href="/inventory.html" class="sidebar-link"><span class="icon">📋</span> <span
                        data-i18n="nav_inventory">المخزون</span></a>
                <a href="/pos.html" class="sidebar-link"><span class="icon">💻</span> <span data-i18n="nav_pos">نقطة
                        البيع (POS)</span></a>
                <a href="/sales.html" class="sidebar-link"><span class="icon">💰</span> <span
                        data-i18n="nav_sales">المبيعات</span></a>
                <a href="/reports.html" class="sidebar-link"><span class="icon">📈</span> <span
                        data-i18n="nav_reports">التقارير</span></a>
                <a href="/support.html" class="sidebar-link active"><span class="icon">🎧</span> <span
                        data-i18n="nav_support">الدعم الفني</span></a>
            </nav>
            <div class="sidebar-bottom">
                <button onclick="window.location.href='/'" class="btn btn-primary"
                    style="width: 100%; margin-bottom: 10px;" data-i18n="btn_home">🏠 الرئيسية</button>
                <button onclick="logout()" class="btn btn-danger" style="width: 100%;" data-i18n="btn_logout">تسجيل
                    الخروج</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main" style="flex-direction: column; overflow: hidden; height: 100vh;">
            <header class="topbar" style="flex-shrink: 0; flex-wrap: wrap; gap: 0.5rem;">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <button class="btn btn-outline mobile-hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')" style="border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; padding: 0;"><i class="fas fa-bars"></i></button>
                    <h1 class="topbar-title" data-i18n="title_support" style="font-size: 1.1rem;"><i class="fas fa-life-ring"></i> مركز الدعم الفني</h1>
                </div>
                <div class="topbar-actions" style="display: flex; gap: 0.5rem; align-items: center;">
                    <button onclick="toggleTheme()" class="btn btn-outline" id="theme-toggle"
                        style="border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 0.9rem;">🌓</button>
                    <button onclick="toggleLanguage()" class="btn btn-outline" id="langToggle"
                        style="padding: 0.3rem 0.6rem; font-size: 0.8rem;">English</button>
                </div>
            </header>

            <div style="flex: 1; display: flex; overflow: hidden; background: var(--bg); position: relative;">

                <!-- Left Sidebar: Tickets List -->
                <div id="ticketSidePanel"
                    style="width: 320px; border-inline-end: 1px solid var(--border); display: flex; flex-direction: column; background: var(--bg-card); flex-shrink: 0;">
                    <div
                        style="padding: 1rem; border-bottom: 1px solid var(--border); display:flex; justify-content: center;">
                        <button onclick="showNewTicketForm()" class="btn btn-primary"
                            style="width: 100%; border-radius: 20px;">
                            <i class="fas fa-plus"></i> <span data-i18n="new_ticket">تذكرة جديدة</span>
                        </button>
                    </div>
                    <div id="ticketsContainer" style="flex: 1; overflow-y: auto;">
                        <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">جاري تحميل
                            التذاكر...</div>
                    </div>
                </div>

                <!-- Right Side: Chat / Form -->
                <div style="flex: 1; display: flex; flex-direction: column; background: var(--bg-secondary, #e5ddd5); position: relative;">

                    <!-- Default Welcome -->
                    <div id="defaultWelcome"
                        style="flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #888;">
                        <i class="fas fa-headset" style="font-size: 4rem; opacity: 0.5; margin-bottom: 1rem;"></i>
                        <h3 data-i18n="title_support" style="color: #666;">مركز الدعم الفني</h3>
                    </div>

                    <!-- New Ticket Form -->
                    <div id="newTicketForm"
                        style="display: none; flex: 1; padding: 2rem; overflow-y: auto; background: var(--bg-card);">
                        <div style="max-width: 600px; margin: 0 auto;">
                            <h2 style="margin-bottom: 1.5rem; color: var(--text);" data-i18n="new_ticket"><i
                                    class="fas fa-headset text-primary"></i> تذكرة جديدة</h2>
                            <div class="form-group">
                                <label data-i18n="label_subject">موضوع المشكلة</label>
                                <input type="text" id="ticketSubject" class="form-input"
                                    placeholder="مثال: مشكلة في الدفع..." required>
                            </div>
                            <div class="form-group">
                                <label data-i18n="label_message">تفاصيل المشكلة (رسالتك)</label>
                                <textarea id="ticketMessage" class="form-input" rows="5"
                                    placeholder="اشرح مشكلتك بالتفصيل هنا..." required></textarea>
                            </div>
                            <button onclick="submitTicket()" id="submitBtn" class="btn btn-primary"
                                style="width: 100%; justify-content: center;">
                                <i class="fas fa-paper-plane"></i> <span data-i18n="btn_send">إرسال التذكرة</span>
                            </button>
                        </div>
                    </div>

                    <!-- Active Chat -->
                    <div id="activeChat" style="display: none; flex: 1; flex-direction: column; height: 100%;">
                        <div
                            style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border, #ccc); background: var(--bg-card, #f0f2f5); display: flex; align-items: center; flex-shrink: 0;">
                            <button class="mobile-back-btn" onclick="mobileBackToList()" style="display:none; align-items:center; justify-content:center; width:36px; height:36px; border:none; background:none; cursor:pointer; color:var(--text); font-size:1.2rem; margin-inline-end:0.5rem;"><i class="fas fa-arrow-right"></i></button>
                            <div
                                style="width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; margin-inline-end: 1rem;">
                                <i class="fas fa-life-ring"></i>
                            </div>
                            <div>
                                <div id="chatSubject" style="font-weight: bold; color: #111; font-size: 1.1rem;"></div>
                                <div id="chatStatusBadge" style="font-size: 0.8rem;"></div>
                            </div>
                        </div>

                        <!-- Chat Bubbles Area -->
                        <div id="messagesArea"
                            style="flex: 1; overflow-y: auto; padding: 2rem 5%; display: flex; flex-direction: column; gap: 0.5rem; background: var(--bg, #e5ddd5);">
                            <!-- Bubbles -->
                        </div>

                        <div id="chatInputArea"
                            style="padding: 1rem; background: var(--bg-card, #f0f2f5); display: flex; gap: 0.5rem; flex-shrink: 0; align-items: flex-end;">
                            <textarea id="replyMessage"
                                style="flex: 1; border: none; border-radius: 20px; padding: 12px 16px; resize: none; outline: none; max-height: 100px; font-family: inherit; font-size: 15px;"
                                rows="1" placeholder="اكتب ردك..."
                                oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                            <button onclick="sendReply()"
                                style="background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;"><i
                                    class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/js/app.js?v=1776972693408"></script>
    <script>
        const translations = {
            en: {
                nav_dashboard: "Dashboard", nav_products: "Products", nav_inventory: "Inventory", nav_pos: "POS System", nav_sales: "Sales", nav_reports: "Reports", nav_support: "Support",
                btn_theme: "Theme", btn_logout: "Logout", btn_home: "🏠 Home",
                title_support: "Technical Support Center",
                new_ticket: "New Ticket", label_subject: "Subject", label_message: "Message Details", btn_send: "Send Ticket",
                prev_tickets: "My Previous Tickets"
            },
            ar: {
                nav_dashboard: "لوحة التحكم", nav_products: "المنتجات", nav_inventory: "المخزون", nav_pos: "نقطة البيع (POS)", nav_sales: "المبيعات", nav_reports: "التقارير", nav_support: "الدعم الفني",
                btn_theme: "المظهر", btn_logout: "تسجيل الخروج", btn_home: "🏠 الرئيسية",
                title_support: "مركز الدعم الفني",
                new_ticket: "تذكرة جديدة", label_subject: "موضوع المشكلة", label_message: "تفاصيل المشكلة (رسالتك)", btn_send: "إرسال التذكرة",
                prev_tickets: "تذاكري السابقة"
            }
        };

        let currentLang = localStorage.getItem('sg_lang') || 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.lang = currentLang;
        document.getElementById('langToggle').textContent = currentLang === 'ar' ? 'English' : 'عربي';
        document.body.className = localStorage.getItem('sg_theme') || 'light';

        function updateTexts() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    if (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA') el.textContent = translations[currentLang][key];
                }
            });
            const user = getUser();
            if (user && document.getElementById('userGreeting')) document.getElementById('userGreeting').textContent = currentLang === 'ar' ? `مرحباً بك، ${user.fullName}` : `Welcome, ${user.fullName}`;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('sg_lang', currentLang);
            updateTexts();
            location.reload();
        }

        let allTickets = [];
        let activeTicketId = null;

        function showNewTicketForm() {
            activeTicketId = null;
            document.getElementById('defaultWelcome').style.display = 'none';
            document.getElementById('activeChat').style.display = 'none';
            document.getElementById('newTicketForm').style.display = 'block';
            // On mobile, hide ticket list to reveal the form
            if (window.innerWidth <= 768) {
                const panel = document.getElementById('ticketSidePanel');
                if (panel) panel.classList.add('mobile-hidden');
            }
            renderConversations();
        }

        async function loadTickets(silent = false) {
            try {
                const res = await api('/api/support');
                allTickets = res.tickets || [];
                renderConversations();

                if (activeTicketId) {
                    const activeTicket = allTickets.find(t => t._id === activeTicketId);
                    if (activeTicket) renderChat(activeTicket, silent);
                }
            } catch (error) {
                console.error('Error loading tickets:', error);
            }
        }

        function renderConversations() {
            const container = document.getElementById('ticketsContainer');
            if (allTickets.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        <p>${currentLang === 'en' ? 'No tickets found.' : 'لا توجد لديك تذاكر دعم فني سابقة'}</p>
                    </div>`;
                return;
            }

            container.innerHTML = allTickets.map(t => {
                const isActive = t._id === activeTicketId;
                const date = new Date(t.createdAt).toLocaleDateString(currentLang === 'en' ? 'en-US' : 'ar-EG');
                const time = new Date(t.createdAt).toLocaleTimeString(currentLang === 'en' ? 'en-US' : 'ar-EG', { hour: '2-digit', minute: '2-digit' });

                let lastSnippet = t.message;
                if (t.messages && t.messages.length > 0) {
                    lastSnippet = t.messages[t.messages.length - 1].content;
                }
                if (lastSnippet.length > 30) lastSnippet = lastSnippet.substring(0, 30) + '...';

                // Dot indicator for unread
                const unreadDot = t.hasUnreadUser ? `<div style="width: 10px; height: 10px; background: #ef4444; border-radius: 50%; margin-top: 4px;"></div>` : '';

                return `
                    <div onclick="openChat('${t._id}')" style="cursor: pointer; padding: 1rem; border-bottom: 1px solid var(--border); background: ${isActive ? 'var(--bg-secondary)' : 'transparent'}; transition: background 0.2s;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                            <h4 style="margin: 0; font-size: 1rem; color: var(--text); font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;">${t.subject}</h4>
                            <span style="font-size: 0.75rem; color: var(--text-secondary);">${time}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <p style="margin: 0; font-size: 0.85rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;">${lastSnippet}</p>
                            ${unreadDot}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function mobileBackToList() {
            const panel = document.getElementById('ticketSidePanel');
            if (panel) panel.classList.remove('mobile-hidden');
            document.getElementById('activeChat').style.display = 'none';
            document.getElementById('defaultWelcome').style.display = 'flex';
        }

        async function openChat(id) {
            activeTicketId = id;
            document.getElementById('defaultWelcome').style.display = 'none';
            document.getElementById('newTicketForm').style.display = 'none';
            document.getElementById('activeChat').style.display = 'flex';
            // On mobile, hide ticket list when chat is open
            if (window.innerWidth <= 768) {
                const panel = document.getElementById('ticketSidePanel');
                if (panel) panel.classList.add('mobile-hidden');
            }

            const t = allTickets.find(x => x._id === id);

            // Mark as read on server if unread
            if (t.hasUnreadUser) {
                t.hasUnreadUser = false;
                try { await api(`/api/support/${id}/read`, { method: 'PUT' }); } catch(e) {}
                // Also refresh the sidebar badge
                if (typeof checkUnreadTickets === 'function') checkUnreadTickets();
            }

            // Header UI
            document.getElementById('chatSubject').textContent = t.subject;
            // Only show 'قيد الانتظار' when status is 'open' (admin hasn't replied)
            if (t.status === 'open') {
                let statusText = currentLang === 'en' ? 'Pending' : 'قيد الانتظار';
                document.getElementById('chatStatusBadge').innerHTML = `<span style="color: #ca8a04; font-weight: bold;">${statusText}</span>`;
            } else if (t.status === 'answered') {
                let statusText = currentLang === 'en' ? 'Answered' : 'تم الرد';
                document.getElementById('chatStatusBadge').innerHTML = `<span style="color: #059669; font-weight: bold;">${statusText}</span>`;
            } else {
                document.getElementById('chatStatusBadge').innerHTML = '';
            }

            // If Ticket closed/resolved, hide input
            document.getElementById('chatInputArea').style.display = t.status === 'closed' ? 'none' : 'flex';

            renderConversations();
            renderChat(t, false);
        }

        function renderChat(t, preventScroll) {
            const container = document.getElementById('messagesArea');

            const msgs = [];

            // Modern Threads
            if (t.messages && t.messages.length > 0) {
                t.messages.forEach(m => msgs.push({ role: m.role, content: m.content, date: m.createdAt }));
            } else {
                // Fallback strictly for older tickets created before Phase 15
                if (t.message) msgs.push({ role: 'user', content: t.message, date: t.createdAt });
                if (t.adminReply) msgs.push({ role: 'admin', content: t.adminReply, date: t.repliedAt || t.updatedAt });
            }

            let html = '';
            msgs.forEach(m => {
                const isMe = m.role === 'user';
                const bg = isMe ? '#d9fdd3' : '#ffffff';
                const align = isMe ? 'flex-end' : 'flex-start';
                const radius = isMe ? '15px 15px 0 15px' : '15px 15px 15px 0';
                const timeStr = new Date(m.date).toLocaleTimeString(currentLang === 'en' ? 'en-US' : 'ar-EG', { hour: '2-digit', minute: '2-digit' });

                html += `
                    <div style="align-self: ${align}; max-width: 75%; background: ${bg}; padding: 10px 14px; border-radius: ${radius}; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative;">
                        <div style="color: #111; font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap;">${m.content}</div>
                        <div style="font-size: 0.65rem; color: #888; text-align: end; margin-top: 5px;" dir="ltr">${timeStr}</div>
                    </div>
                `;
            });

            const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
            container.innerHTML = html;

            if (!preventScroll || wasAtBottom) {
                setTimeout(() => { container.scrollTop = container.scrollHeight; }, 50);
            }
        }

        async function submitTicket() {
            const subject = document.getElementById('ticketSubject').value.trim();
            const message = document.getElementById('ticketMessage').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!subject || !message) {
                Swal.fire({ icon: 'warning', title: currentLang === 'en' ? 'Alert' : 'تنبيه', text: currentLang === 'en' ? 'Please fill subject and message' : 'يرجى إدخال الموضوع والرسالة' });
                return;
            }

            btn.disabled = true;
            try {
                const response = await api('/api/support', {
                    method: 'POST',
                    body: JSON.stringify({ subject, message })
                });

                document.getElementById('ticketSubject').value = '';
                document.getElementById('ticketMessage').value = '';

                await loadTickets();
                // Find and open the new ticket
                if (response.ticket) openChat(response.ticket._id);
            } catch (error) {
                Swal.fire({ icon: 'error', title: currentLang === 'en' ? 'Error' : 'خطأ', text: error.message });
            } finally {
                btn.disabled = false;
            }
        }

        async function sendReply() {
            const input = document.getElementById('replyMessage');
            const replyText = input.value.trim();
            if (!replyText || !activeTicketId) return;

            input.value = '';
            input.style.height = '';

            // Optimistic rendering
            const ticket = allTickets.find(t => t._id === activeTicketId);
            if (ticket.messages) {
                ticket.messages.push({ role: 'user', content: replyText, createdAt: new Date() });
            }
            ticket.status = 'open';
            // Update chat header status badge
            const statusText = currentLang === 'en' ? 'Pending' : 'قيد الانتظار';
            document.getElementById('chatStatusBadge').innerHTML = `<span style="color: #ca8a04; font-weight: bold;">${statusText}</span>`;
            renderChat(ticket, false);

            try {
                await api(`/api/support/${activeTicketId}/reply`, {
                    method: 'POST',
                    body: JSON.stringify({ message: replyText })
                });
                loadTickets(true);
            } catch (error) {
                Swal.fire('خطأ', error.message || 'فشل الإرسال', 'error');
            }
        }

        document.getElementById('replyMessage')?.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendReply();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (!getToken()) window.location.href = '/login.html';
            else {
                updateTexts();
                loadTickets();
                setInterval(() => loadTickets(true), 5000); // UI Poller
            }
        });
    </script>
</body>

</html>
